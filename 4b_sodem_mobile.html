<script>
const numberData = {
0: ["Zero", "/ˈzɪərəʊ/"], 1: ["One", "/wʌn/"], 2: ["Two", "/tuː/"], 3: ["Three", "/θriː/"], 4: ["Four", "/fɔː/"],
5: ["Five", "/faɪv/"], 6: ["Six", "/sɪks/"], 7: ["Seven", "/ˈsev.ən/"], 8: ["Eight", "/eɪt/"], 9: ["Nine", "/naɪn/"],
10: ["Ten", "/ten/"], 11: ["Eleven", "/ɪˈlev.ən/"], 12: ["Twelve", "/twelv/"], 13: ["Thirteen", "/ˌθɜːˈtiːn/"],
14: ["Fourteen", "/ˌfɔːˈtiːn/"], 15: ["Fifteen", "/ˌfɪfˈtiːn/"], 16: ["Sixteen", "/ˌsɪkˈstiːn/"],
17: ["Seventeen", "/ˌsev.ənˈtiːn/"], 18: ["Eighteen", "/ˌeɪˈtiːn/"], 19: ["Nineteen", "/ˌnaɪnˈtiːn/"], 20: ["Twenty", "/ˈtwen.ti/"]
};

let questions = [];
let currentIdx = 0;
let score = 0;
let targetNum = null;
let canClick = true;
let hintUsed = false;

const sndCorrect = document.getElementById('snd-correct');
const sndWrong = document.getElementById('snd-wrong');

window.startGame = function() {

    // unlock speech
    const unlockUtterance = new SpeechSynthesisUtterance('');
    window.speechSynthesis.speak(unlockUtterance);

    // unlock audio
    sndCorrect.play().then(()=>{
        sndCorrect.pause();
        sndCorrect.currentTime = 0;
    }).catch(()=>{});

    sndWrong.play().then(()=>{
        sndWrong.pause();
        sndWrong.currentTime = 0;
    }).catch(()=>{});

    document.getElementById('welcome-screen').style.display = 'none';
    document.getElementById('main-game').style.display = 'block';

    questions = Object.keys(numberData)
        .map(n => parseInt(n))
        .sort(() => Math.random() - 0.5);

    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    for(let i=0;i<=20;i++){
        const b = document.createElement('button');
        b.className = 'num-btn';
        b.id = 'btn-'+i;
        b.innerText = i;
        b.onclick = () => check(i,b);
        grid.appendChild(b);
    }

    load();
}

function load(){

    if(currentIdx >= 21){
        finish();
        return;
    }

    canClick = true;
    hintUsed = false;

    targetNum = questions[currentIdx];

    document.getElementById('word-text').innerText = numberData[targetNum][0];
    document.getElementById('phonetic-text').innerText = numberData[targetNum][1];

    document.getElementById('progress-text').innerText = `Câu ${currentIdx+1}/21`;

    document.getElementById('progress-fill').style.width =
        `${(currentIdx/21)*100}%`;

    document.querySelectorAll('.num-btn')
        .forEach(b => b.classList.remove('correct','wrong','highlight'));

    setTimeout(playCurrent,120);
}

window.playCurrent = function(){

    if(window.speechSynthesis.speaking){
        window.speechSynthesis.cancel();
    }

    const utter = new SpeechSynthesisUtterance(numberData[targetNum][0]);
    utter.lang = 'en-US';
    utter.rate = 0.85;

    window.speechSynthesis.speak(utter);
}

window.showHint = function(){

    if(!canClick) return;

    hintUsed = true;

    const b = document.getElementById('btn-'+targetNum);

    b.classList.add('highlight');

    setTimeout(()=>{
        b.classList.remove('highlight');
    },1000);
}

function check(n,b){

    if(!canClick) return;

    if(n === targetNum){

        canClick = false;

        if(!hintUsed) score++;

        b.classList.add('correct');

        sndCorrect.currentTime = 0;
        sndCorrect.play().catch(()=>{});

        setTimeout(()=>{
            currentIdx++;
            load();
        },800);

    }else{

        b.classList.add('wrong');

        sndWrong.currentTime = 0;
        sndWrong.play().catch(()=>{});

        setTimeout(()=>{
            b.classList.remove('wrong');
        },400);
    }
}

function finish(){

    document.getElementById('main-game').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';

    document.getElementById('res-score').innerText = `${score}/21`;

    document.getElementById('res-msg').innerText =
        score === 21
        ? "Tuyệt vời! Bạn là thiên tài số học."
        : "Khá lắm! Hãy thử lại nhé.";
}
</script>
