<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thử thách Nghe Số 0-20 - Mobile Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00cec9;
            --secondary: #6c5ce7;
            --success: #2ecc71;
            --error: #ff7675;
            --hint: #fdcb6e;
            --bg: #f8f9fa;
            --text-main: #2d3436;
            --text-sub: #636E72;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Quicksand', sans-serif; 
            background: var(--bg); 
            margin: 0; color: var(--text-main); 
            display: flex; flex-direction: column; min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: auto;
            padding: 15px;
        }

        #login-screen, #welcome-screen, #main-game {
            display: none;
            width: 100%;
            animation: fadeIn 0.4s ease-out;
        }

        #login-screen { display: flex; min-height: 100vh; align-items: center; justify-content: center; }

        .card {
            background: #FFFFFF;
            padding: 30px 20px;
            border-radius: 2rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
            width: 100%;
        }

        .login-header h2 { font-size: 1.8rem; color: var(--secondary); margin: 0 0 10px; }
        .login-header p { color: var(--text-sub); font-size: 1rem; margin-bottom: 30px; }

        .google-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            background: #FFFFFF; color: var(--text-main); border: 2px solid #E5E7EB;
            padding: 14px 20px; border-radius: 100px; cursor: pointer;
            font-weight: 700; font-size: 1rem; width: 100%; font-family: inherit;
        }

        /* --- GAME UI --- */
        .display-word { 
            background: #f0f7ff; border-radius: 15px; border: 2px solid #e1f0ff;
            padding: 20px; margin-bottom: 20px; min-height: 100px;
            display: flex; flex-direction: column; justify-content: center;
        }
        #word-text { font-size: 1.8rem; font-weight: 700; color: var(--secondary); display: block; }
        #phonetic-text { font-size: 1.1rem; color: #0984e3; font-style: italic; }

        .audio-controls { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .btn-play { 
            width: 70px; height: 70px; border-radius: 50%; background: var(--primary); border: none;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 206, 201, 0.3);
        }
        .btn-play svg { fill: white; width: 35px; height: 35px; }

        .numbers-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
            margin: 20px 0; 
        }
        
        @media (max-width: 360px) { .numbers-grid { grid-template-columns: repeat(3, 1fr); } }

        .num-btn { 
            aspect-ratio: 1/1; font-size: 1.2rem; font-weight: 700; 
            border: 2px solid #dfe6e9; border-radius: 12px; background: white;
            box-shadow: 0 4px 0 #dfe6e9; cursor: pointer; font-family: inherit;
        }

        .num-btn.correct { background: var(--success)!important; color: white!important; border-color: var(--success)!important; box-shadow: 0 4px 0 #27ae60!important; }
        .num-btn.wrong { background: var(--error)!important; color: white!important; border-color: var(--error)!important; box-shadow: 0 4px 0 #e74c3c!important; }
        .num-btn.highlight { background: var(--hint)!important; color: white!important; border-color: var(--hint)!important; transform: scale(1.05); }

        .progress-bar { height: 10px; background: #eee; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        #progress-fill { height: 100%; background: var(--secondary); width: 0%; transition: 0.4s; }

        .btn-main { 
            padding: 15px 30px; border-radius: 100px; border: none; 
            background: var(--secondary); color: white; font-weight: 700; width: 100%;
            margin-top: 15px; font-family: inherit; font-size: 1rem; cursor: pointer;
        }

        .result-gif { width: 160px; border-radius: 15px; margin-bottom: 15px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .balloon { position: fixed; bottom: -100px; width: 30px; height: 45px; border-radius: 50%; animation: floatUp 4s linear forwards; pointer-events: none; }
        @keyframes floatUp { to { transform: translateY(-120vh); } }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="container">
        <div class="card">
            <div class="login-header">
                <h2>Xin chào! 👋</h2>
                <p>Vui lòng đăng nhập để bắt đầu thử thách luyện nghe nhé.</p>
            </div>
            <button id="login-btn" class="google-btn">
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59L2.56 13.22C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                </svg>
                Tiếp tục với Google
            </button>
            <div id="login-msg" style="margin-top: 20px; color: var(--error); font-weight: 700; font-size: 0.9rem; min-height: 1.2rem;"></div>
        </div>
    </div>
</div>

<div id="welcome-screen">
    <div class="container">
        <div class="card">
            <span style="font-size: 50px; display: block; margin-bottom: 10px;">🎧</span>
            <h1 style="font-size: 1.6rem; margin: 0 0 10px;">Chào mừng bạn!</h1>
            <p id="user-welcome" style="color: var(--secondary); font-weight: 700; margin: 0 0 15px;"></p>
            <p style="font-size: 0.95rem; color: var(--text-sub); line-height: 1.5;">Nghe phát âm con số và chọn đúng ô tương ứng. Bạn đã sẵn sàng chưa?</p>
            <button class="btn-main" onclick="startGame()">BẮT ĐẦU CHƠI 🚀</button>
            <button id="logout-btn" style="background: none; color: #b2bec3; margin-top: 15px; font-weight: 600; border:none; cursor:pointer; text-decoration: underline;">Đăng xuất</button>
        </div>
    </div>
</div>

<div id="main-game">
    <div class="container">
        <div class="card" id="game-content">
            <div class="display-word">
                <span id="word-text">...</span>
                <span id="phonetic-text">...</span>
            </div>

            <div class="audio-controls">
                <button class="btn-play" id="btn-play-trigger" onclick="playCurrentNumber()">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>
                <button style="background: white; border: 2px solid var(--hint); border-radius: 12px; padding: 10px 18px; font-weight: 700; color: #d35400; cursor: pointer; font-family: inherit;" onclick="showHint()">💡 Gợi ý</button>
            </div>

            <div class="numbers-grid" id="grid"></div>

            <div style="display: flex; justify-content: space-between; font-weight: 700; color: #888; font-size: 0.8rem; margin-bottom: 5px;">
                <span>TIẾN ĐỘ</span>
                <span id="progress-text">1 / 21</span>
            </div>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>

        <div class="card" id="result-screen" style="display: none;">
            <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExamhuOW92OWVlYzcyajB4Z2hlNDZ3aDZqNTRjYzMxbnVhd2Vjbnp0ayZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o6fIUZTTDl0IDjbZS/giphy.gif" class="result-gif">
            <h2 id="res-title" style="margin: 0;">Kết quả</h2>
            <h3 id="res-score" style="font-size: 2.2rem; color: var(--secondary); margin: 10px 0;">0 / 21</h3>
            <p id="res-msg" style="font-size: 0.95rem; color: var(--text-sub); margin-bottom: 20px;"></p>
            <button class="btn-main" onclick="resetGameToWelcome()">Chơi lại từ đầu</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdlTVHwiLOGMnrFe12DE1dQSEHZaJ594I",
        authDomain: "nguyen-am-tieng-anh.firebaseapp.com",
        projectId: "nguyen-am-tieng-anh",
        storageBucket: "nguyen-am-tieng-anh.firebasestorage.app",
        messagingSenderId: "878440633705",
        appId: "1:878440633705:web:755de6cb273eb139ebd9f8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // 1. Xử lý sau khi Redirect quay lại trang
    getRedirectResult(auth).catch((error) => {
        document.getElementById("login-msg").innerText = "Lỗi đăng nhập: " + error.message;
    });

    // 2. Theo dõi trạng thái đăng nhập
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById("login-msg").innerText = "Đang kiểm tra quyền truy cập...";
            const allowed = await checkAccess(user.email);
            if (allowed) {
                showWelcomeScreen(user.displayName);
            } else {
                await signOut(auth);
                document.getElementById("login-screen").style.display = "flex";
                document.getElementById("login-msg").innerText = "Tài khoản không có quyền truy cập!";
            }
        } else {
            document.getElementById("login-screen").style.display = "flex";
            document.getElementById("welcome-screen").style.display = "none";
            document.getElementById("main-game").style.display = "none";
        }
    });

    async function checkAccess(email) {
        const q = query(collection(db, "Tienganh_so_cap"), where("email", "==", email));
        const snap = await getDocs(q);
        return !snap.empty;
    }

    function showWelcomeScreen(name) {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("welcome-screen").style.display = "block";
        document.getElementById("user-welcome").innerText = "Chào bạn, " + (name || "học viên") + "!";
    }

    // Nút đăng nhập dùng Redirect cho Mobile
    document.getElementById("login-btn").onclick = () => {
        signInWithRedirect(auth, provider);
    };

    document.getElementById("logout-btn").onclick = () => {
        signOut(auth).then(() => location.reload());
    };
</script>

<script>
    // Game Logic
    const numberData = {
        0: ["Zero", "/ˈzɪərəʊ/"], 1: ["One", "/wʌn/"], 2: ["Two", "/tuː/"], 3: ["Three", "/θriː/"], 4: ["Four", "/fɔː/"],
        5: ["Five", "/faɪv/"], 6: ["Six", "/sɪks/"], 7: ["Seven", "/ˈsev.ən/"], 8: ["Eight", "/eɪt/"], 9: ["Nine", "/naɪn/"],
        10: ["Ten", "/ten/"], 11: ["Eleven", "/ɪˈlev.ən/"], 12: ["Twelve", "/twelv/"], 13: ["Thirteen", "/ˌθɜːˈtiːn/"],
        14: ["Fourteen", "/ˌfɔːˈtiːn/"], 15: ["Fifteen", "/ˌfɪfˈtiːn/"], 16: ["Sixteen", "/ˌsɪkˈstiːn/"],
        17: ["Seventeen", "/ˌsev.ənˈtiːn/"], 18: ["Eighteen", "/ˌeɪˈtiːn/"], 19: ["Nineteen", "/ˌnaɪnˈtiːn/"], 20: ["Twenty", "/ˈtwen.ti/"]
    };

    let questions = [], currentStep = 0, score = 0, targetNum = null, canClick = true, hintUsed = false;
    const TOTAL_STEPS = 21;

    function startGame() {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('main-game').style.display = 'block';
        initGame();
    }

    function initGame() {
        questions = Object.keys(numberData).sort(() => Math.random() - 0.5);
        currentStep = 0; score = 0;
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 0; i <= 20; i++) {
            const btn = document.createElement('button');
            btn.className = 'num-btn'; btn.id = 'btn-' + i; btn.innerText = i;
            btn.onclick = () => checkAnswer(i, btn);
            grid.appendChild(btn);
        }
        loadQuestion();
    }

    function loadQuestion() {
        if (currentStep >= TOTAL_STEPS) { finishGame(); return; }
        canClick = true; hintUsed = false;
        targetNum = questions[currentStep];
        document.getElementById('word-text').innerText = numberData[targetNum][0];
        document.getElementById('phonetic-text').innerText = numberData[targetNum][1];
        document.getElementById('progress-text').innerText = `${currentStep + 1} / ${TOTAL_STEPS}`;
        document.getElementById('progress-fill').style.width = `${((currentStep) / TOTAL_STEPS) * 100}%`;
        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('correct', 'wrong', 'highlight'));
        
        // Trì hoãn phát âm một chút để UI mượt hơn
        setTimeout(playCurrentNumber, 300);
    }

    function playCurrentNumber() {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(numberData[targetNum][0]);
        utter.lang = 'en-US'; utter.rate = 0.8;
        window.speechSynthesis.speak(utter);
    }

    function showHint() {
        if (!canClick) return;
        const btn = document.getElementById('btn-' + targetNum);
        btn.classList.add('highlight');
        setTimeout(() => btn.classList.remove('highlight'), 1200);
        hintUsed = true;
    }

    function checkAnswer(num, btn) {
        if (!canClick) return;
        if (num == targetNum) {
            canClick = false; if (!hintUsed) score++;
            btn.classList.add('correct');
            setTimeout(() => { currentStep++; loadQuestion(); }, 800);
        } else {
            btn.classList.add('wrong');
            setTimeout(() => btn.classList.remove('wrong'), 500);
        }
    }

    function finishGame() {
        document.getElementById('game-content').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('res-score').innerText = `Đúng ${score} / ${TOTAL_STEPS} câu`;
        
        const msg = document.getElementById('res-msg');
        if (score === TOTAL_STEPS) {
            msg.innerText = "Tuyệt vời! Bạn đã trả lời đúng tất cả.";
            createBalloons();
        } else if (score > 10) {
            msg.innerText = "Khá tốt! Hãy cố gắng đạt điểm tối đa nhé.";
        } else {
            msg.innerText = "Hãy luyện tập thêm để ghi nhớ con số tốt hơn.";
        }
    }

    function resetGameToWelcome() {
        document.getElementById('main-game').style.display = 'none';
        document.getElementById('game-content').style.display = 'block';
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('welcome-screen').style.display = 'block';
    }

    function createBalloons() {
        const colors = ['#ff7675', '#74b9ff', '#55efc4', '#ffeaa7', '#a29bfe'];
        for (let i = 0; i < 30; i++) {
            const b = document.createElement('div');
            b.className = 'balloon';
            b.style.left = Math.random() * 100 + 'vw';
            b.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            b.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 4000);
        }
    }
</script>

</body>
</html>
