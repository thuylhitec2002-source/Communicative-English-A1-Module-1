<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thử thách Nghe Số 0-20 - Mobile Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00cec9; --secondary: #6c5ce7; --success: #2ecc71;
            --error: #ff7675; --hint: #fdcb6e; --bg: #f8f9fa;
            --text-main: #2d3436; --text-sub: #636E72;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Quicksand', sans-serif; background: var(--bg); 
            margin: 0; color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh;
        }

        /* MÀN HÌNH CHỜ LOADING */
        #loading-overlay {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000;
        }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid var(--secondary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .container { width: 100%; max-width: 500px; margin: auto; padding: 15px; }
        #login-screen, #welcome-screen, #main-game { display: none; width: 100%; animation: fadeIn 0.4s ease-out; }

        .card { background: #FFFFFF; padding: 30px 20px; border-radius: 2rem; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; width: 100%; }
        .google-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            background: #FFFFFF; color: var(--text-main); border: 2px solid #E5E7EB;
            padding: 14px 20px; border-radius: 100px; cursor: pointer; font-weight: 700; width: 100%; font-family: inherit;
        }

        /* GAME UI */
        .display-word { background: #f0f7ff; border-radius: 15px; border: 2px solid #e1f0ff; padding: 20px; margin-bottom: 20px; min-height: 100px; display: flex; flex-direction: column; justify-content: center; }
        #word-text { font-size: 1.8rem; font-weight: 700; color: var(--secondary); }
        .numbers-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .num-btn { aspect-ratio: 1/1; font-size: 1.2rem; font-weight: 700; border: 2px solid #dfe6e9; border-radius: 12px; background: white; box-shadow: 0 4px 0 #dfe6e9; font-family: inherit; }
        .num-btn.correct { background: var(--success)!important; color: white; border-color: var(--success)!important; box-shadow: 0 4px 0 #27ae60!important; }
        .num-btn.wrong { background: var(--error)!important; color: white; border-color: var(--error)!important; box-shadow: 0 4px 0 #e74c3c!important; }
        .progress-bar { height: 10px; background: #eee; border-radius: 5px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--secondary); width: 0%; transition: 0.4s; }
        .btn-main { padding: 15px 30px; border-radius: 100px; border: none; background: var(--secondary); color: white; font-weight: 700; width: 100%; margin-top: 15px; font-family: inherit; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="loader"></div>
    <p style="margin-top: 15px; color: var(--text-sub); font-weight: 600;">Đang kiểm tra dữ liệu...</p>
</div>

<div id="login-screen">
    <div class="container">
        <div class="card">
            <h2 style="color: var(--secondary);">Xin chào! 👋</h2>
            <p style="color: var(--text-sub); margin-bottom: 30px;">Đăng nhập một lần duy nhất để bắt đầu.</p>
            <button id="login-btn" class="google-btn">
                <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59L2.56 13.22C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path></svg>
                Tiếp tục với Google
            </button>
            <div id="login-msg" style="margin-top: 20px; color: var(--error); font-weight: 700;"></div>
        </div>
    </div>
</div>

<div id="welcome-screen">
    <div class="container">
        <div class="card">
            <span style="font-size: 50px;">🎧</span>
            <h1 id="user-welcome">Chào bạn!</h1>
            <p style="color: var(--text-sub);">Hệ thống đã ghi nhớ tài khoản của bạn.</p>
            <button class="btn-main" onclick="startGame()">BẮT ĐẦU CHƠI 🚀</button>
            <button id="logout-btn" style="background:none; border:none; color:#b2bec3; margin-top:15px; text-decoration:underline;">Đăng xuất</button>
        </div>
    </div>
</div>

<div id="main-game">
    <div class="container">
        <div class="card" id="game-content">
            <div class="display-word">
                <span id="word-text">...</span>
                <span id="phonetic-text" style="color:#0984e3; font-style:italic;">...</span>
            </div>
            <div style="display:flex; justify-content:center; gap:15px; margin-bottom:20px;">
                <button class="btn-main" style="width:70px; height:70px; margin:0; border-radius:50%;" onclick="playCurrentNumber()">🔊</button>
                <button style="background:white; border:2px solid var(--hint); border-radius:12px; padding:0 20px; font-weight:700; color:#d35400;" onclick="showHint()">💡 Gợi ý</button>
            </div>
            <div class="numbers-grid" id="grid"></div>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>

        <div class="card" id="result-screen" style="display: none;">
            <h2>Kết quả</h2>
            <h3 id="res-score" style="font-size: 2.5rem; color: var(--secondary);">0 / 21</h3>
            <button class="btn-main" onclick="resetGameToWelcome()">Chơi lại</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, setPersistence, browserLocalPersistence, signInWithRedirect, getRedirectResult, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdlTVHwiLOGMnrFe12DE1dQSEHZaJ594I",
        authDomain: "nguyen-am-tieng-anh.firebaseapp.com",
        projectId: "nguyen-am-tieng-anh",
        storageBucket: "nguyen-am-tieng-anh.firebasestorage.app",
        messagingSenderId: "878440633705",
        appId: "1:878440633705:web:755de6cb273eb139ebd9f8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // 1. ÉP BUỘC GHI NHỚ ĐĂNG NHẬP (LOCAL)
    setPersistence(auth, browserLocalPersistence).then(() => {
        // Sau khi cấu hình xong thì kiểm tra kết quả Redirect (nếu có)
        return getRedirectResult(auth);
    }).catch(e => console.error(e));

    // 2. THEO DÕI TRẠNG THÁI (TRÁNH BẮT ĐĂNG NHẬP LẠI)
    onAuthStateChanged(auth, async (user) => {
        const loading = document.getElementById("loading-overlay");
        if (user) {
            const allowed = await checkAccess(user.email);
            if (allowed) {
                document.getElementById("user-welcome").innerText = "Chào, " + user.displayName;
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("welcome-screen").style.display = "block";
            } else {
                await signOut(auth);
                alert("Bạn không có quyền truy cập!");
            }
        } else {
            document.getElementById("login-screen").style.display = "flex";
            document.getElementById("welcome-screen").style.display = "none";
        }
        loading.style.display = "none"; // Ẩn màn hình chờ sau khi kiểm tra xong
    });

    async function checkAccess(email) {
        const q = query(collection(db, "Tienganh_so_cap"), where("email", "==", email));
        const snap = await getDocs(q);
        return !snap.empty;
    }

    document.getElementById("login-btn").onclick = () => signInWithRedirect(auth, provider);
    document.getElementById("logout-btn").onclick = () => signOut(auth).then(() => location.reload());
</script>

<script>
    // GIỮ NGUYÊN LOGIC GAME Ở ĐÂY (Data và các hàm startGame, loadQuestion, checkAnswer...)
    const numberData = { 0: ["Zero", "/ˈzɪərəʊ/"], 1: ["One", "/wʌn/"], 2: ["Two", "/tuː/"], 3: ["Three", "/θriː/"], 4: ["Four", "/fɔː/"], 5: ["Five", "/faɪv/"], 6: ["Six", "/sɪks/"], 7: ["Seven", "/ˈsev.ən/"], 8: ["Eight", "/eɪt/"], 9: ["Nine", "/naɪn/"], 10: ["Ten", "/ten/"], 11: ["Eleven", "/ɪˈlev.ən/"], 12: ["Twelve", "/twelv/"], 13: ["Thirteen", "/ˌθɜːˈtiːn/"], 14: ["Fourteen", "/ˌfɔːˈtiːn/"], 15: ["Fifteen", "/ˌfɪfˈtiːn/"], 16: ["Sixteen", "/ˌsɪkˈstiːn/"], 17: ["Seventeen", "/ˌsev.ənˈtiːn/"], 18: ["Eighteen", "/ˌeɪˈtiːn/"], 19: ["Nineteen", "/ˌnaɪnˈtiːn/"], 20: ["Twenty", "/ˈtwen.ti/"] };
    let questions = [], currentStep = 0, score = 0, targetNum = null, canClick = true, hintUsed = false;

    function startGame() {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('main-game').style.display = 'block';
        initGame();
    }
    function initGame() {
        questions = Object.keys(numberData).sort(() => Math.random() - 0.5);
        currentStep = 0; score = 0;
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        for (let i = 0; i <= 20; i++) {
            const btn = document.createElement('button'); btn.className = 'num-btn'; btn.id = 'btn-' + i; btn.innerText = i;
            btn.onclick = () => checkAnswer(i, btn); grid.appendChild(btn);
        }
        loadQuestion();
    }
    function loadQuestion() {
        if (currentStep >= 21) { finishGame(); return; }
        canClick = true; hintUsed = false; targetNum = questions[currentStep];
        document.getElementById('word-text').innerText = numberData[targetNum][0];
        document.getElementById('phonetic-text').innerText = numberData[targetNum][1];
        document.getElementById('progress-fill').style.width = `${(currentStep / 21) * 100}%`;
        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('correct', 'wrong', 'highlight'));
        setTimeout(playCurrentNumber, 500);
    }
    function playCurrentNumber() {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(numberData[targetNum][0]);
        utter.lang = 'en-US'; utter.rate = 0.8; window.speechSynthesis.speak(utter);
    }
    function checkAnswer(num, btn) {
        if (!canClick) return;
        if (num == targetNum) {
            canClick = false; if(!hintUsed) score++;
            btn.classList.add('correct');
            setTimeout(() => { currentStep++; loadQuestion(); }, 800);
        } else {
            btn.classList.add('wrong'); setTimeout(() => btn.classList.remove('wrong'), 500);
        }
    }
    function showHint() {
        if (!canClick) return;
        const btn = document.getElementById('btn-' + targetNum);
        btn.classList.add('highlight'); setTimeout(() => btn.classList.remove('highlight'), 1200);
        hintUsed = true;
    }
    function finishGame() {
        document.getElementById('game-content').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('res-score').innerText = `Đúng ${score} / 21`;
    }
    function resetGameToWelcome() {
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('game-content').style.display = 'block';
        document.getElementById('main-game').style.display = 'none';
        document.getElementById('welcome-screen').style.display = 'block';
    }
</script>

</body>
</html>
