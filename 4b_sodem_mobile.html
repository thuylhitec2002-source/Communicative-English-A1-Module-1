<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nghe Số 0-20</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#00cec9;
--secondary:#6c5ce7;
--success:#2ecc71;
--error:#ff7675;
--hint:#fdcb6e;
--bg:#f8f9fa;
--shadow:0 8px 25px rgba(0,0,0,0.08);
}

body{
font-family:'Quicksand',sans-serif;
background:var(--bg);
margin:0;
display:flex;
justify-content:center;
padding:15px;
}

.card{
background:white;
padding:20px;
border-radius:25px;
box-shadow:var(--shadow);
text-align:center;
width:100%;
max-width:420px;
}

.numbers-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:15px;
}

.num-btn{
aspect-ratio:1/1;
font-size:1.4rem;
font-weight:700;
border-radius:15px;
border:2px solid #eee;
background:white;
cursor:pointer;
}

.num-btn.correct{
background:var(--success)!important;
color:white;
}

.num-btn.wrong{
background:var(--error)!important;
color:white;
}

.progress-bar{
height:12px;
background:#eee;
border-radius:10px;
overflow:hidden;
}

#progress-fill{
height:100%;
background:var(--secondary);
width:0%;
transition:.3s;
}

.btn-main{
margin-top:15px;
width:100%;
padding:15px;
border-radius:100px;
border:none;
background:var(--secondary);
color:white;
font-weight:700;
font-size:1.1rem;
cursor:pointer;
}
</style>
</head>

<body>

<div id="auth-overlay" class="card">
<h2>🎧 Luyện Nghe Số</h2>
<p id="auth-status">Vui lòng đăng nhập</p>
<button id="login-btn" class="btn-main">Đăng nhập Google</button>
<div id="error-box"></div>
</div>

<div id="welcome-screen" class="card" style="display:none">
<h1>Sẵn sàng?</h1>
<button class="btn-main" onclick="startGame()">BẮT ĐẦU</button>
</div>

<div id="main-game" class="card" style="display:none">

<div class="progress-bar">
<div id="progress-fill"></div>
</div>

<div id="progress-text">Câu 1/21</div>

<div style="font-size:2rem;margin:15px 0" id="word-text">...</div>

<button onclick="playCurrent()">🔊</button>

<div class="numbers-grid" id="grid"></div>

</div>

<div id="result-screen" class="card" style="display:none">

<h2>Kết quả</h2>

<h1 id="res-score">0/21</h1>

<button class="btn-main" onclick="location.reload()">Chơi lại</button>

</div>


<!-- AUDIO -->
<audio id="snd-correct" preload="auto">
<source src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3">
</audio>

<audio id="snd-wrong" preload="auto">
<source src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3">
</audio>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyCdlTVHwiLOGMnrFe12DE1dQSEHZaJ594I",
authDomain:"nguyen-am-tieng-anh.firebaseapp.com",
projectId:"nguyen-am-tieng-anh"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth();

const provider=new GoogleAuthProvider();

document.getElementById("login-btn").onclick=async()=>{

try{

const res=await signInWithPopup(auth,provider);

if(res.user){

playSound("correct"); // 🔔 tink khi login

document.getElementById("auth-overlay").style.display="none";
document.getElementById("welcome-screen").style.display="block";

}

}catch(e){

document.getElementById("error-box").innerText=e.message;

}

};

</script>


<script>

const sndCorrect=document.getElementById("snd-correct");
const sndWrong=document.getElementById("snd-wrong");

/* ---------- SOUND ENGINE (ỔN ĐỊNH) ---------- */

function playSound(type){

let snd = type==="correct" ? sndCorrect : sndWrong;

snd.pause();
snd.currentTime=0;

snd.play().catch(()=>{});

}

/* ---------- DATA ---------- */

const numberData={
0:["Zero"],
1:["One"],
2:["Two"],
3:["Three"],
4:["Four"],
5:["Five"],
6:["Six"],
7:["Seven"],
8:["Eight"],
9:["Nine"],
10:["Ten"],
11:["Eleven"],
12:["Twelve"],
13:["Thirteen"],
14:["Fourteen"],
15:["Fifteen"],
16:["Sixteen"],
17:["Seventeen"],
18:["Eighteen"],
19:["Nineteen"],
20:["Twenty"]
};

let questions=[];
let currentIdx=0;
let score=0;
let targetNum=null;

/* ---------- GAME ---------- */

window.startGame=function(){

document.getElementById("welcome-screen").style.display="none";
document.getElementById("main-game").style.display="block";

questions=Object.keys(numberData).sort(()=>Math.random()-0.5);

const grid=document.getElementById("grid");
grid.innerHTML="";

for(let i=0;i<=20;i++){

let b=document.createElement("button");
b.className="num-btn";
b.innerText=i;

b.onclick=()=>check(i,b);

grid.appendChild(b);

}

load();

}

/* ---------- LOAD QUESTION ---------- */

function load(){

if(currentIdx>=21){
finish();
return;
}

targetNum=questions[currentIdx];

document.getElementById("word-text").innerText=numberData[targetNum][0];

document.getElementById("progress-text").innerText=`Câu ${currentIdx+1}/21`;

document.getElementById("progress-fill").style.width=(currentIdx/21*100)+"%";

playCurrent();

}

/* ---------- SPEECH ---------- */

window.playCurrent=function(){

speechSynthesis.cancel();

const u=new SpeechSynthesisUtterance(numberData[targetNum][0]);
u.lang="en-US";
u.rate=0.85;

speechSynthesis.speak(u);

}

/* ---------- CHECK ---------- */

function check(n,btn){

if(n==targetNum){

score++;

btn.classList.add("correct");

playSound("correct"); // 🔔 tink

setTimeout(()=>{
currentIdx++;
load();
},700);

}else{

btn.classList.add("wrong");

playSound("wrong");

setTimeout(()=>btn.classList.remove("wrong"),400);

}

}

/* ---------- FINISH ---------- */

function finish(){

document.getElementById("main-game").style.display="none";

document.getElementById("result-screen").style.display="block";

document.getElementById("res-score").innerText=score+"/21";

}

</script>

</body>
</html>
