<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nghe Số 0-20</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Quicksand',sans-serif;
background:#f8f9fa;
margin:0;
padding:15px;
display:flex;
justify-content:center;
}

.card{
background:white;
padding:20px;
border-radius:20px;
max-width:420px;
width:100%;
box-shadow:0 8px 25px rgba(0,0,0,.08);
text-align:center;
}

.numbers-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:15px;
}

.num-btn{
aspect-ratio:1/1;
font-size:1.4rem;
font-weight:700;
border-radius:12px;
border:2px solid #eee;
background:white;
}

.correct{background:#2ecc71;color:white;}
.wrong{background:#ff7675;color:white;}

.progress-bar{
height:10px;
background:#eee;
border-radius:10px;
overflow:hidden;
}

#progress-fill{
height:100%;
background:#6c5ce7;
width:0%;
}

.btn-main{
margin-top:15px;
width:100%;
padding:14px;
border:none;
border-radius:100px;
background:#6c5ce7;
color:white;
font-weight:700;
font-size:1.1rem;
}

</style>
</head>

<body>

<div id="auth-overlay" class="card">
<h2>🎧 Luyện Nghe Số</h2>
<p id="auth-status">Đăng nhập để bắt đầu</p>
<button id="login-btn" class="btn-main">Đăng nhập Google</button>
<p id="error-box"></p>
</div>

<div id="welcome-screen" class="card" style="display:none">
<h2>Sẵn sàng?</h2>
<button class="btn-main" onclick="startGame()">BẮT ĐẦU</button>
</div>

<div id="main-game" class="card" style="display:none">

<div class="progress-bar">
<div id="progress-fill"></div>
</div>

<p id="progress-text">Câu 1/21</p>

<h2 id="word-text">...</h2>

<button onclick="playCurrent()">🔊 Nghe</button>

<div class="numbers-grid" id="grid"></div>

</div>

<div id="result-screen" class="card" style="display:none">

<h2>Kết quả</h2>

<h1 id="res-score">0/21</h1>

<button class="btn-main" onclick="location.reload()">Chơi lại</button>

</div>


<audio id="snd-correct" preload="auto"
src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>

<audio id="snd-wrong" preload="auto"
src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>


<script>

window.addEventListener("error",e=>{
document.body.innerHTML="<pre>"+e.message+"</pre>";
});

</script>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth,signInWithPopup,GoogleAuthProvider,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore,collection,query,where,getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


const firebaseConfig={
apiKey:"AIzaSyCdlTVHwiLOGMnrFe12DE1dQSEHZaJ594I",
authDomain:"nguyen-am-tieng-anh.firebaseapp.com",
projectId:"nguyen-am-tieng-anh",
storageBucket:"nguyen-am-tieng-anh.appspot.com"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

const provider=new GoogleAuthProvider();

const statusEl=document.getElementById("auth-status");
const errorEl=document.getElementById("error-box");


onAuthStateChanged(auth,async user=>{
if(user) checkAccess(user);
});


async function checkAccess(user){

statusEl.innerText="Đang kiểm tra quyền...";

const q=query(
collection(db,"Tienganh_so_cap"),
where("email","==",user.email)
);

const snap=await getDocs(q);

if(!snap.empty){

playSound("correct");

document.getElementById("auth-overlay").style.display="none";
document.getElementById("welcome-screen").style.display="block";

}else{

statusEl.innerText="Email chưa được cấp quyền";

}

}


document.getElementById("login-btn").onclick=async()=>{

try{

const res=await signInWithPopup(auth,provider);

if(res.user) checkAccess(res.user);

}catch(e){

errorEl.innerText=e.message;

}

}

</script>



<script>

const sndCorrect=document.getElementById("snd-correct");
const sndWrong=document.getElementById("snd-wrong");

function playSound(type){

let snd=type==="correct"?sndCorrect:sndWrong;

snd.pause();
snd.currentTime=0;
snd.play().catch(()=>{});

}


const numberData={
0:["Zero"],1:["One"],2:["Two"],3:["Three"],4:["Four"],5:["Five"],
6:["Six"],7:["Seven"],8:["Eight"],9:["Nine"],10:["Ten"],
11:["Eleven"],12:["Twelve"],13:["Thirteen"],14:["Fourteen"],
15:["Fifteen"],16:["Sixteen"],17:["Seventeen"],18:["Eighteen"],
19:["Nineteen"],20:["Twenty"]
};

let questions=[];
let currentIdx=0;
let score=0;
let targetNum=null;


window.startGame=function(){

document.getElementById("welcome-screen").style.display="none";
document.getElementById("main-game").style.display="block";

questions=Object.keys(numberData).sort(()=>Math.random()-0.5);

const grid=document.getElementById("grid");
grid.innerHTML="";

for(let i=0;i<=20;i++){

let b=document.createElement("button");
b.className="num-btn";
b.innerText=i;

b.onclick=()=>check(i,b);

grid.appendChild(b);

}

load();

}



function load(){

if(currentIdx>=21){finish();return;}

targetNum=questions[currentIdx];

document.getElementById("word-text").innerText=numberData[targetNum][0];

document.getElementById("progress-text").innerText=`Câu ${currentIdx+1}/21`;

document.getElementById("progress-fill").style.width=(currentIdx/21*100)+"%";

playCurrent();

}



window.playCurrent=function(){

speechSynthesis.cancel();

let u=new SpeechSynthesisUtterance(numberData[targetNum][0]);

u.lang="en-US";
u.rate=.85;

speechSynthesis.speak(u);

}



function check(n,b){

if(n==targetNum){

score++;

b.classList.add("correct");

playSound("correct");

setTimeout(()=>{
currentIdx++;
load();
},700);

}else{

b.classList.add("wrong");

playSound("wrong");

setTimeout(()=>b.classList.remove("wrong"),400);

}

}



function finish(){

document.getElementById("main-game").style.display="none";
document.getElementById("result-screen").style.display="block";

document.getElementById("res-score").innerText=score+"/21";

}

</script>

</body>
</html>
