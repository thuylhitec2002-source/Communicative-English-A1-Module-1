<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Challenge - Login Edition</title>
    <style>
        :root { --primary: #007bff; --secondary: #6610f2; --bg: #f8f9fa; --text: #333; --card: #ffffff; --error: #ff7675; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        
        #game-container { 
            background: var(--card); border-radius: 30px; width: 420px; padding: 40px; text-align: center; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1); border: 1px solid rgba(0,0,0,0.05); animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .screen { display: none; }
        .active { display: block; animation: zoomIn 0.4s; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        h1 { font-size: 26px; color: var(--primary); margin-bottom: 15px; font-weight: 800; }
        #countdown-text { font-size: 90px; font-weight: 900; color: var(--secondary); }

        /* UI Đăng nhập */
        .google-btn {
            background: white; color: #2d3436; border: 1px solid #dfe6e9; padding: 1rem 2rem; border-radius: 50px; 
            cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: bold; margin: 20px auto;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); transition: 0.3s;
        }
        .google-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 20px rgba(0,0,0,0.1); }

        .btn-main { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; border: none; padding: 16px 45px; border-radius: 15px; 
            font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s;
        }
        .option-btn { 
            background: #ffffff; color: #444; border: 2px solid #eee; padding: 20px; border-radius: 18px; 
            cursor: pointer; font-size: 19px; margin-bottom: 15px; width: 100%; font-weight: 600; transition: 0.25s;
        }
        .option-btn:hover { border-color: var(--primary); color: var(--primary); background: #f0f7ff; transform: scale(1.03); }
        .correct { background: #28a745 !important; color: white !important; }
        .wrong { background: #dc3545 !important; color: white !important; animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
        #result-img { width: 100%; border-radius: 20px; margin: 20px 0; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="login-screen" class="screen active">
        <h1>PHONE CHALLENGE</h1>
        <p style="color: #636e72;">Vui lòng đăng nhập để bắt đầu thử thách</p>
        <button id="login-btn" class="google-btn">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59L2.56 13.22C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path></svg>
            Tiếp tục với Google
        </button>
        <p id="login-msg" style="color: var(--error); font-size: 0.9rem; font-weight: bold;"></p>
    </div>

    <div id="start-screen" class="screen">
        <h1>SẴN SÀNG?</h1>
        <p id="user-welcome" style="font-weight: bold; color: var(--secondary);"></p>
        <p class="msg">Tập trung nghe và chọn số chính xác.</p>
        <br>
        <button class="btn-main" onclick="startCountdown()">BẮT ĐẦU NGAY</button>
    </div>

    <div id="countdown-screen" class="screen">
        <div id="countdown-text">3</div>
    </div>

    <div id="play-screen" class="screen">
        <div id="question-header" style="display:flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: #888;">
            <span id="question-number">1/4</span>
            <span id="live-score" style="color: var(--primary);">Đúng: 0</span>
        </div>
        <button class="btn-main" style="width:100%; margin-bottom: 25px; background: #333;" onclick="playPhoneAudio()">🔈 NGHE SỐ</button>
        <div id="options-container"></div>
    </div>

    <div id="end-screen" class="screen">
        <h1>KẾT THÚC!</h1>
        <h2 id="final-score" style="font-size: 32px; color: var(--secondary);">0/4</h2>
        <p style="font-weight: bold; color: #28a745;">Chúc mừng bạn đã hoàn thành bài thi.<br>Tiếp tục phát huy!</p>
        <img id="result-img" src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExMmUzNDV6N3N2eG9ncWs2MDM2dGJxeGRhYmR6OGw5MXJvZjVkaHowMiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/QW5nKIoebG8y4/giphy.gif">
        <button class="btn-main" onclick="location.reload()">CHƠI LẠI</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdlTVHwiLOGMnrFe12DE1dQSEHZaJ594I",
        authDomain: "nguyen-am-tieng-anh.firebaseapp.com",
        projectId: "nguyen-am-tieng-anh",
        storageBucket: "nguyen-am-tieng-anh.firebasestorage.app",
        messagingSenderId: "878440633705",
        appId: "1:878440633705:web:755de6cb273eb139ebd9f8",
        measurementId: "G-EM8Y1QW6QH"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // GAME LOGIC
    const quizData = [
        { audio: "Phone 1.wav", options: ["328 8553214", "328 82522214"], answer: "328 8553214" },
        { audio: "Phone 2.wav", options: ["349 755556089", "349 7456089"], answer: "349 7456089" },
        { audio: "Phone 3.wav", options: ["0879 5479911", "0879 5479921"], answer: "0879 5479921" },
        { audio: "Phone 4.wav", options: ["348 9422075", "348 8422075"], answer: "348 8422075" }
    ];

    let currentQ = 0, score = 0;
    const sfxReadyGo = new Audio('readygo.mp3');
    const sfxCorrect = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3'); 
    const sfxWrong = new Audio('https://assets.mixkit.co/active_storage/sfx/2020/2020-preview.mp3'); 
    const sfxWin = new Audio('https://tiengdong.com/wp-content/uploads/Tieng-yeah-tre-con-www_tiengdong_com.mp3?_=1');

    // LOGIN FUNCTION
    document.getElementById("login-btn").onclick = async () => {
        try {
            const res = await signInWithPopup(auth, provider);
            const q = query(collection(db, "Tienganh_so_cap"), where("email", "==", res.user.email));
            const snap = await getDocs(q);
            
            if (!snap.empty) {
                document.getElementById("user-welcome").innerText = "Chào " + res.user.displayName + "!";
                showScreen('start-screen');
            } else {
                document.getElementById("login-msg").innerText = "Email không có quyền truy cập.";
                await signOut(auth);
            }
        } catch (e) {
            document.getElementById("login-msg").innerText = "Lỗi đăng nhập hoặc bị hủy.";
        }
    };

    // GAME FUNCTIONS (Đưa vào window để gọi từ HTML)
    window.startCountdown = function() {
        showScreen('countdown-screen');
        sfxReadyGo.play().catch(e => console.log("Audio waiting"));
        let count = 3;
        const timer = setInterval(() => {
            count--;
            if (count > 0) document.getElementById('countdown-text').innerText = count;
            else if (count === 0) document.getElementById('countdown-text').innerText = "GO!";
            else { clearInterval(timer); startGame(); }
        }, 1000);
    }

    function startGame() { showScreen('play-screen'); loadQuestion(); }

    function loadQuestion() {
        if (currentQ >= quizData.length) { endGame(); return; }
        const q = quizData[currentQ];
        document.getElementById('question-number').innerText = `Câu ${currentQ + 1}/${quizData.length}`;
        document.getElementById('live-score').innerText = `Đúng: ${score}`;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = opt;
            b.onclick = () => check(b, opt, q.answer);
            container.appendChild(b);
        });
        window.playPhoneAudio();
    }

    window.playPhoneAudio = function() {
        new Audio(quizData[currentQ].audio).play();
    }

    function check(btn, selected, correct) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.onclick = null); 
        if (selected === correct) {
            btn.classList.add('correct');
            sfxCorrect.play();
            score++;
        } else {
            btn.classList.add('wrong');
            sfxWrong.play();
            buttons.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        }
        setTimeout(() => { currentQ++; loadQuestion(); }, 1800);
    }

    function endGame() {
        showScreen('end-screen');
        document.getElementById('final-score').innerText = `${score}/${quizData.length}`;
        sfxWin.play();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>

</body>
</html>
