<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Master: Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-hover: #F8F7FF;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg: #f4f7f6;
            --text-main: #2d3436;
            --text-sub: #636E72;
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

        body { 
            font-family: 'Quicksand', sans-serif; 
            background: var(--bg); 
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; color: var(--text-main); overflow: hidden;
        }

        /* --- LOGIN UI --- */
        #login-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-card {
            background: #FFFFFF; padding: 5.5rem 3.5rem; border-radius: 3rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.05); text-align: center;
            max-width: 540px; width: 90%; display: flex; flex-direction: column; gap: 3.5rem; 
        }
        .login-header { display: flex; flex-direction: column; gap: 1.2rem; }
        .login-header h2 { font-size: 2.2rem; font-weight: 700; color: var(--primary); margin: 0; letter-spacing: -1px; }
        .login-header p { color: var(--text-sub); font-size: 1.15rem; margin: 0; font-weight: 500; }
        
        .google-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 14px;
            background: #FFFFFF; color: var(--text-main); border: 1.5px solid #E5E7EB;
            padding: 1rem 3rem; border-radius: 100px; cursor: pointer; font-weight: 700; font-size: 1.05rem; font-family: inherit;
        }
        .google-btn:hover { border-color: var(--primary); background: var(--primary-hover); transform: translateY(-3px); }

        /* --- MUSIC CONTROL --- */
        .music-toggle {
            position: fixed; top: 25px; left: 25px; z-index: 1000;
            background: white; border: 2px solid var(--primary); color: var(--primary);
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; box-shadow: 0 4px 12px rgba(108, 92, 231, 0.15);
        }

        /* --- MAIN GAME UI --- */
        #main-content { display: none; width: 100%; height: 100vh; justify-content: center; align-items: center; }
        .game-card { 
            background: white; width: 95%; max-width: 650px; border-radius: 2.5rem; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.06); padding: 45px; text-align: center; position: relative; 
        }
        .btn-show { 
            position: absolute; top: 25px; right: 25px; background: var(--primary-hover); color: var(--primary); 
            padding: 8px 20px; border-radius: 50px; border: none; cursor: pointer; font-weight: 700; font-size: 0.85rem;
        }
        .header h1 { color: var(--primary); font-size: 1.6rem; margin: 0 0 20px 0; font-weight: 700; }
        .progress-bar-bg { height: 10px; background: #F3F4F6; border-radius: 10px; overflow: hidden; margin-bottom: 25px; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.5s; }

        /* FIX: CHỮ TRONG Ô NHẬP TO VÀ RÕ */
        .word-container { display: flex; justify-content: center; align-items: flex-end; gap: 6px; flex-wrap: wrap; margin: 40px 0; min-height: 80px; font-size: 2.8rem; font-weight: 700; }
        .letter-input { 
            width: 45px; border: none; border-bottom: 4px solid #E5E7EB; 
            background: transparent; text-align: center; font-family: inherit; 
            font-size: 2.8rem; font-weight: 700; color: var(--primary); outline: none; 
            padding-bottom: 2px;
        }
        .letter-fixed { color: var(--text-main); padding-bottom: 6px; }
        
        .input-correct { border-bottom-color: var(--success) !important; color: var(--success) !important; }
        .input-error { border-bottom-color: var(--error) !important; color: var(--error) !important; animation: shake 0.3s; }

        .btn-main { padding: 18px 45px; border: none; border-radius: 100px; cursor: pointer; font-weight: 700; width: 260px; font-family: inherit; font-size: 1.1rem; }
        .btn-check { background: var(--primary); color: white; box-shadow: 0 8px 20px rgba(108, 92, 231, 0.2); }
        #btn-next { background: var(--success); color: white; display: none; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        #result-screen { display: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <div class="login-header">
            <h2>Hệ Thống Trực Tuyến</h2>
            <p>Vui lòng đăng nhập để bắt đầu thử thách Spelling Master của bạn.</p>
        </div>
        
        <button id="login-btn" class="google-btn">
            <svg width="22" height="22" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59L2.56 13.22C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
            </svg>
            Tiếp tục với Google
        </button>
        <div id="login-msg"></div>
    </div>
</div>

<div id="main-content">
    <button class="music-toggle" onclick="toggleMusic()" id="music-btn">🔊</button>
    
    <div class="game-card">
        <button class="btn-show" onclick="revealAnswer()">💡 Xem đáp án</button>
        <div id="game-content">
            <div class="header"><h1>Spelling Master ✍️</h1></div>
            <div style="display:flex; justify-content: space-between; font-weight: 700; margin-bottom: 10px;">
                <span id="progress-text">Câu: 1 / 15</span>
                <span style="color: var(--success)">Đúng: <span id="score-text">0</span></span>
            </div>
            <div class="progress-bar-bg"><div id="progress-fill"></div></div>
            <div id="type-tag" style="background:#0984e3; padding:5px 15px; border-radius:50px; color:white; font-size:0.75rem; font-weight:700; display:inline-block; text-transform: uppercase;">COUNTRY</div>
            <h2 id="viet-hint" style="margin: 10px 0; font-size: 2.2rem; font-weight: 700;">Việt Nam</h2>
            <div class="word-container" id="word-area"></div>
            <div style="margin-top: 35px;">
                <button id="btn-check" class="btn-main btn-check" onclick="finalCheck()">Kiểm tra (Enter)</button>
                <button id="btn-next" class="btn-main" onclick="goNext()">Tiếp theo →</button>
            </div>
        </div>
        <div id="result-screen">
            <div style="font-size: 5rem; margin-bottom: 20px;">🎉</div>
            <h2 style="font-size: 2rem; color: var(--primary);">Hoàn thành!</h2>
            <div id="total-score" style="font-size: 3.5rem; font-weight: 800; margin: 20px 0;">0 / 15</div>
            <button class="btn-main btn-check" onclick="location.reload()">Làm lại bài tập</button>
        </div>
    </div>
</div>

<audio id="bg-music" src="https://cdn.pixabay.com/audio/2025/01/31/audio_210b378eb7.mp3" loop></audio>
<audio id="snd-correct" src="https://tiengdong.com/wp-content/uploads/am-thanh-cau-tra-loi-dung-right-answer-capcut-www_tiengdong_com.mp3?_=1"></audio>
<audio id="snd-wrong" src="https://cdn.pixabay.com/audio/2022/03/10/audio_8b0fae46ef.mp3"></audio>
<audio id="snd-congrats" src="https://tiengdong.com/wp-content/uploads/Am-thanh-chuc-mung-chien-thang-www_tiengdong_com.mp3?_=1"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdlTVHwiLOGMnrFe12DE1dQSEHZaJ594I",
        authDomain: "nguyen-am-tieng-anh.firebaseapp.com",
        projectId: "nguyen-am-tieng-anh",
        storageBucket: "nguyen-am-tieng-anh.firebasestorage.app",
        messagingSenderId: "878440633705",
        appId: "1:878440633705:web:755de6cb273eb139ebd9f8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    document.getElementById("login-btn").onclick = async () => {
        try {
            const res = await signInWithPopup(auth, provider);
            const q = query(collection(db, "Tienganh_so_cap"), where("email", "==", res.user.email));
            const snap = await getDocs(q);
            if (!snap.empty) {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("main-content").style.display = "flex";
                document.getElementById('bg-music').play().catch(()=>{});
                window.initQuiz();
            } else {
                document.getElementById("login-msg").innerText = "Email không được cấp quyền!";
                await signOut(auth);
            }
        } catch (e) { document.getElementById("login-msg").innerText = "Lỗi đăng nhập!"; }
    };
</script>

<script>
    const data = [
        { vn: "Việt Nam", en: "Vietnam", type: "country" },
        { vn: "Người Việt Nam", en: "Vietnamese", type: "nationality" },
        { vn: "Thái Lan", en: "Thailand", type: "country" },
        { vn: "Người Nhật", en: "Japanese", type: "nationality" },
        { vn: "Philippines (Nước)", en: "Philippines", type: "country" },
        { vn: "Người Hàn Quốc", en: "Korean", type: "nationality" },
        { vn: "Nước Mỹ", en: "USA", type: "country" },
        { vn: "Người Mỹ", en: "American", type: "nationality" },
        { vn: "Người Anh", en: "English", type: "nationality" },
        { vn: "Australia (Nước Úc)", en: "Australia", type: "country" },
        { vn: "Người Malaysia", en: "Malaysian", type: "nationality" },
        { vn: "Germany (Nước Đức)", en: "Germany", type: "country" },
        { vn: "Người Ý (Italy)", en: "Italian", type: "nationality" },
        { vn: "Người Canada", en: "Canadian", type: "nationality" },
        { vn: "Người Hi Lạp", en: "Greek", type: "nationality" }
    ];

    let currentIdx = 0; let score = 0; let wasHintUsed = false;
    const bgMusic = document.getElementById('bg-music');

    function toggleMusic() {
        const btn = document.getElementById('music-btn');
        if (bgMusic.paused) { bgMusic.play(); btn.innerText = "🔊"; }
        else { bgMusic.pause(); btn.innerText = "🔇"; }
    }

    window.initQuiz = function() {
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('btn-check').style.display = 'inline-block';
        wasHintUsed = false;
        const item = data[currentIdx];
        const area = document.getElementById('word-area');
        area.innerHTML = '';
        document.getElementById('viet-hint').innerText = item.vn;
        document.getElementById('type-tag').innerText = item.type;
        document.getElementById('type-tag').className = `tag tag-${item.type}`;
        document.getElementById('progress-text').innerText = `Câu: ${currentIdx + 1} / ${data.length}`;
        document.getElementById('progress-fill').style.width = `${((currentIdx + 1) / data.length) * 100}%`;
        
        item.en.split('').forEach((char, i) => {
            const isBlank = (i % 3 === 1 && char !== ' ');
            const box = document.createElement( isBlank ? 'input' : 'span' );
            if (isBlank) {
                box.className = 'letter-input'; box.maxLength = 1; box.dataset.answer = char.toLowerCase();
                box.oninput = function() { if(this.value) moveNext(this); }; box.onkeydown = handleKey;
            } else { box.innerText = char; box.className = 'letter-fixed'; }
            area.appendChild(box);
        });
        const firstInput = area.querySelector('input'); if(firstInput) firstInput.focus();
    }

    function moveNext(el) {
        const inputs = Array.from(document.querySelectorAll('.letter-input'));
        const index = inputs.indexOf(el); if (index < inputs.length - 1) inputs[index + 1].focus();
    }

    function handleKey(e) {
        if (e.key === "Backspace" && !e.target.value) {
            const inputs = Array.from(document.querySelectorAll('.letter-input'));
            const index = inputs.indexOf(e.target); if (index > 0) inputs[index - 1].focus();
        } else if (e.key === "Enter") {
            if (document.getElementById('btn-next').style.display === 'inline-block') goNext(); else finalCheck();
        }
    }

    function finalCheck() {
        const inputs = document.querySelectorAll('.letter-input'); let allCorrect = true;
        inputs.forEach(input => {
            if (input.value.toLowerCase() === input.dataset.answer) {
                input.classList.add('input-correct'); input.classList.remove('input-error');
            } else {
                input.classList.add('input-error'); input.classList.remove('input-correct'); allCorrect = false;
            }
        });
        if (allCorrect) {
            if (document.getElementById('btn-next').style.display !== 'inline-block') {
                document.getElementById('snd-correct').play().catch(()=>{});
                if (!wasHintUsed) { score++; document.getElementById('score-text').innerText = score; }
                document.getElementById('btn-check').style.display = 'none';
                document.getElementById('btn-next').style.display = 'inline-block';
            }
        } else { document.getElementById('snd-wrong').play().catch(()=>{}); }
    }

    function revealAnswer() {
        wasHintUsed = true;
        document.querySelectorAll('.letter-input').forEach(input => {
            input.value = input.dataset.answer; input.classList.add('input-correct');
        });
        document.getElementById('btn-check').style.display = 'none';
        document.getElementById('btn-next').style.display = 'inline-block';
    }

    function goNext() {
        if (currentIdx < data.length - 1) { currentIdx++; window.initQuiz(); } else showFinal();
    }

    function showFinal() {
        bgMusic.pause();
        document.getElementById('game-content').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('total-score').innerText = `${score} / ${data.length}`;
        document.getElementById('snd-congrats').play().catch(()=>{});
    }
</script>
</body>
</html>
