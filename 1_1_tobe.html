<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Trực Tuyến - To Be Verb Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #6C5CE7;
            --primary-light: #F8F7FF;
            --success: #2ecc71;
            --error: #e74c3c;
            --text-main: #2D3436;
            --text-sub: #636E72;
            --bg-body: #F0F2F5;
            --translation: #3498db;
            --abandon: #fab1a0;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body { 
            font-family: 'Quicksand', sans-serif; 
            background-color: var(--bg-body); 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- LOGIN UI --- */
        #login-screen {
            position: fixed; inset: 0;
            background: var(--bg-body);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }

        .login-card {
            background: #FFFFFF;
            padding: 4rem 2rem;
            border-radius: 2.5rem;
            box-shadow: 0 15px 50px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        .login-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-purple);
            margin: 0 0 1.2rem 0;
        }

        .google-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #FFFFFF;
            color: var(--text-main);
            border: 1.5px solid #E0E0E0;
            padding: 0.9rem 2.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
        }

        .google-btn:hover {
            border-color: var(--primary-purple);
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.1);
        }

        /* --- GAME UI --- */
        #main-content { display: none; width: 100%; height: 100%; justify-content: center; align-items: center; }

        .music-control {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: white; padding: 10px; border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer;
            width: 45px; height: 45px; display: flex; align-items: center;
            justify-content: center; font-size: 1.5rem; border: 2px solid var(--primary-purple);
        }

        .quiz-container { 
            background: white; width: 100%; max-width: 550px; 
            border-radius: 2rem; box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            padding: 35px; position: relative; z-index: 10;
        }

        .floating-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            display: inline-block;
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .progress-bar { height: 8px; background: #eee; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        #progress { height: 100%; background: var(--primary-purple); width: 0%; transition: 0.5s ease; }

        .blank-space {
            color: var(--primary-purple);
            border-bottom: 3px solid var(--primary-purple);
            padding: 0 8px;
            font-weight: 700;
            text-transform: lowercase;
        }

        .options { display: flex; flex-direction: column; gap: 14px; margin-bottom: 30px; }
        .opt-btn { 
            padding: 18px; border: 2px solid #F0F2F5; border-radius: 1rem; 
            background: white; cursor: pointer; font-size: 1.1rem; font-weight: 700; font-family: inherit;
        }

        .opt-btn:hover:not(:disabled) {
            border-color: var(--primary-purple);
            background: var(--primary-light);
            transform: scale(1.02);
        }

        .correct-ans { background: #E6FFFA !important; border-color: var(--success) !important; color: #234E52 !important; }
        .wrong-ans { background: #FFF5F5 !important; border-color: var(--error) !important; color: #742A2A !important; animation: shake 0.5s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }

        #translation-text { 
            color: var(--translation); font-style: italic; margin-bottom: 25px; padding: 12px;
            display: none; border-left: 4px solid var(--translation); background: #f0faff; border-radius: 0 8px 8px 0;
        }

        .navigation { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 10px; border-top: 1px solid #f0f0f0; padding-top: 25px; }
        .nav-btn { flex: 1; min-width: 100px; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-family: inherit; font-size: 0.9rem; }
        
        #start-btn, .btn-restart, #next-btn.active { background: var(--primary-purple); color: white; }
        #next-btn:disabled { background: #E0E0E0; cursor: not-allowed; color: #A0AEC0; }
        
        #abandon-btn { background: #f1f2f6; color: #a4b0be; border: 1px solid #dfe4ea; }
        #abandon-btn:hover { background: var(--abandon); color: white; border-color: var(--abandon); }

        #quiz-content, #result-screen { display: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <div class="login-header">
            <h2>Hệ Thống Trực Tuyến</h2>
            <p>Vui lòng đăng nhập để làm bài tập</p>
        </div>
        <button id="login-btn" class="google-btn">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59L2.56 13.22C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path></svg>
            Tiếp tục với Google
        </button>
        <div id="login-msg" style="margin-top: 15px; color: var(--error); font-weight: bold;"></div>
    </div>
</div>

<div id="main-content">
    <div class="music-control" onclick="toggleMusic()" id="music-btn">🔇</div>
    <audio id="bg-music" loop><source src="https://vnso-pt-7-tf-a128-z3.zmdcdn.me/25de35937e1e650b577265725f162e6f?authen=exp=1774627563~acl=/25de35937e1e650b577265725f162e6f*~hmac=37d9728c9b8d4c33f4bef14a8d69ef2c" type="audio/mpeg"></audio>
    <audio id="snd-correct" src="https://tiengdong.com/wp-content/uploads/am-thanh-cau-tra-loi-dung-right-answer-capcut-www_tiengdong_com.mp3?_=1"></audio>
    <audio id="snd-wrong" src="https://cdn.pixabay.com/audio/2022/03/10/audio_8b0fae46ef.mp3"></audio>
    <audio id="snd-congrats" src="https://tiengdong.com/wp-content/uploads/Tieng-yeah-tre-con-www_tiengdong_com.mp3?_=1"></audio>

    <div class="quiz-container">
        <div id="start-screen" style="text-align: center;">
            <div class="floating-icon">📝</div>
            <h1>To Be Verb Challenge</h1>
            <p style="color: var(--text-sub); margin-bottom: 35px;">Bấm bắt đầu để quẩy cùng nhạc game!</p>
            <button id="start-btn" class="nav-btn" onclick="startQuiz()">BẮT ĐẦU NGAY</button>
            <button onclick="logout()" style="margin-top: 20px; background: none; border: none; color: var(--text-sub); cursor: pointer; text-decoration: underline;">Đăng xuất</button>
        </div>

        <div id="quiz-content">
            <div class="header-section" style="text-align: center;"><h1>English Quiz</h1></div>
            <div class="progress-bar"><div id="progress"></div></div>
            <div id="q-num" style="font-weight: bold; color: #bdc3c7; font-size: 0.8rem; margin-bottom: 10px;"></div>
            <h2 id="question-text"></h2>
            <div id="translation-text"></div> 
            <div class="options" id="options-container"></div>
            <div class="navigation">
                <button id="abandon-btn" class="nav-btn" onclick="abandonQuiz()">Bỏ cuộc</button>
                <button id="prev-btn" class="nav-btn" onclick="goPrev()">Quay lại</button>
                <button id="next-btn" class="nav-btn" onclick="goNext()" disabled>Tiếp theo →</button>
            </div>
        </div>

        <div id="result-screen" style="text-align: center;">
            <div style="font-size: 5rem; margin-bottom: 20px;">🏆</div>
            <h2 id="result-title" style="color: var(--primary-purple);">Hoàn thành!</h2>
            <div id="score-summary" style="margin-bottom: 25px; font-weight: 700;"></div>
            <button class="nav-btn btn-restart" onclick="location.reload()">Chơi lại từ đầu</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdlTVHwiLOGMnrFe12DE1dQSEHZaJ594I",
        authDomain: "nguyen-am-tieng-anh.firebaseapp.com",
        projectId: "nguyen-am-tieng-anh",
        storageBucket: "nguyen-am-tieng-anh.firebasestorage.app",
        messagingSenderId: "878440633705",
        appId: "1:878440633705:web:755de6cb273eb139ebd9f8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    onAuthStateChanged(auth, (user) => {
        if (user) { checkUserPermission(user.email); } 
        else {
            document.getElementById("login-screen").style.display = "flex";
            document.getElementById("main-content").style.display = "none";
        }
    });

    async function checkUserPermission(email) {
        const q = query(collection(db, "Tienganh_so_cap"), where("email", "==", email));
        const snap = await getDocs(q);
        if (!snap.empty) {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("main-content").style.display = "flex";
        } else {
            document.getElementById("login-msg").innerText = "Email không có quyền truy cập!";
            signOut(auth);
        }
    }

    document.getElementById("login-btn").onclick = async () => {
        try { await signInWithPopup(auth, provider); } 
        catch (e) { document.getElementById("login-msg").innerText = "Lỗi đăng nhập!"; }
    };

    window.logout = () => signOut(auth);
</script>

<script>
    const questions = [
        { q: "1. She _____ from Naples.", options: ["are", "is"], correct: 1, trans: "Cô ấy **LÀ** người đến từ Naples." },
        { q: "2. They _____ from Italy.", options: ["are", "is"], correct: 0, trans: "Họ **LÀ** người đến từ Ý." },
        { q: "3. I _____ English, I am Australian.", options: ["not am", "am not"], correct: 1, trans: "Tôi **KHÔNG PHẢI LÀ** người Anh, tôi là người Úc." },
        { q: "4. The students _____ from different countries.", options: ["are", "am"], correct: 0, trans: "Các sinh viên **ĐẾN TỪ** nhiều quốc gia khác nhau." },
        { q: "5. We _____ tired, let's keep going.", options: ["is not", "are not"], correct: 1, trans: "Chúng tôi **KHÔNG** mệt, hãy tiếp tục đi nào." },
        { q: "6. It _____ my cat.", options: ["not is", "is not"], correct: 1, trans: "Nó **KHÔNG PHẢI LÀ** con mèo của tôi." },
        { q: "7. My father _____ a doctor.", options: ["am", "is"], correct: 1, trans: "Bố tôi **LÀ** một bác sĩ." },
        { q: "8. You _____ very kind.", options: ["are", "is"], correct: 0, trans: "Bạn **THÌ** rất tốt bụng." },
        { q: "9. The weather _____ hot today.", options: ["is", "are"], correct: 0, trans: "Thời tiết hôm nay **THÌ** nóng." },
        { q: "10. This book _____ interesting.", options: ["are", "is"], correct: 1, trans: "Cuốn sách này **THÌ** thú vị." },
        { q: "11. My parents _____ at home.", options: ["are", "is"], correct: 0, trans: "Bố mẹ tôi **ĐANG Ở** nhà." },
        { q: "12. I _____ a student.", options: ["am", "is"], correct: 0, trans: "Tôi **LÀ** một học sinh." },
        { q: "13. These apples _____ red.", options: ["is", "are"], correct: 1, trans: "Những quả táo này **THÌ** màu đỏ." },
        { q: "14. My brother _____ hungry.", options: ["is not", "am not"], correct: 0, trans: "Anh trai tôi **KHÔNG** đói." },
        { q: "15. We _____ late for school.", options: ["is not", "are not"], correct: 1, trans: "Chúng tôi **KHÔNG** bị trễ học." }
    ];

    let currentIdx = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let correctOnFirstTry = 0;
    let attemptsPerQuestion = new Array(questions.length).fill(0);
    const bgMusic = document.getElementById('bg-music');

    function toggleMusic() {
        if (bgMusic.paused) { bgMusic.play(); document.getElementById('music-btn').innerText = "🔊"; }
        else { bgMusic.pause(); document.getElementById('music-btn').innerText = "🔇"; }
    }

    function startQuiz() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-content').style.display = 'block';
        bgMusic.play().catch(e => console.log("Cần tương tác để phát nhạc"));
        loadQuestion();
    }

    function loadQuestion() {
        const qData = questions[currentIdx];
        const isAnswered = userAnswers[currentIdx] !== null;
        
        document.getElementById('q-num').innerText = `CÂU HỎI ${currentIdx + 1} / ${questions.length}`;
        document.getElementById('progress').style.width = `${((currentIdx + 1) / questions.length) * 100}%`;
        
        const displayWord = isAnswered ? `<span class="blank-space">${qData.options[qData.correct]}</span>` : "_____";
        document.getElementById('question-text').innerHTML = qData.q.replace("_____", displayWord);

        const transDiv = document.getElementById('translation-text');
        if (isAnswered) {
            transDiv.innerHTML = qData.trans.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
            transDiv.style.display = 'block';
        } else {
            transDiv.style.display = 'none';
        }

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        document.getElementById('prev-btn').disabled = currentIdx === 0;

        qData.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            if (isAnswered) {
                btn.disabled = true;
                if (index === qData.correct) btn.classList.add('correct-ans');
                if (userAnswers[currentIdx] === index && index !== qData.correct) btn.classList.add('wrong-ans');
            } else {
                btn.onclick = () => checkAnswer(index, btn);
            }
            container.appendChild(btn);
        });
        updateNextButton();
    }

    function checkAnswer(selected, btn) {
        const qData = questions[currentIdx];
        const allBtns = document.querySelectorAll('.opt-btn');
        userAnswers[currentIdx] = selected; 

        if (selected === qData.correct) {
            btn.classList.add('correct-ans');
            document.getElementById('snd-correct').currentTime = 0;
            document.getElementById('snd-correct').play();
            if (attemptsPerQuestion[currentIdx] === 0) correctOnFirstTry++;
        } else {
            btn.classList.add('wrong-ans');
            document.getElementById('snd-wrong').currentTime = 0;
            document.getElementById('snd-wrong').play();
            attemptsPerQuestion[currentIdx]++;
            allBtns[qData.correct].classList.add('correct-ans');
        }
        allBtns.forEach(b => b.disabled = true);
        finishQuestion(qData);
    }

    function finishQuestion(qData) {
        const displayWord = `<span class="blank-space">${qData.options[qData.correct]}</span>`;
        document.getElementById('question-text').innerHTML = qData.q.replace("_____", displayWord);
        document.getElementById('translation-text').innerHTML = qData.trans.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
        document.getElementById('translation-text').style.display = 'block';
        updateNextButton();
    }

    function updateNextButton() {
        const btn = document.getElementById('next-btn');
        const isAnswered = userAnswers[currentIdx] !== null;
        btn.disabled = !isAnswered;
        btn.classList.toggle('active', isAnswered);
        btn.innerText = currentIdx === questions.length - 1 ? "Xem kết quả" : "Tiếp theo →";
    }

    function goNext() {
        if (currentIdx < questions.length - 1) { currentIdx++; loadQuestion(); }
        else { showResult(); }
    }

    function goPrev() { if (currentIdx > 0) { currentIdx--; loadQuestion(); } }

    /** * HÀM BỎ CUỘC ĐÃ ĐƯỢC KHAI BÁO RÕ RÀNG Ở ĐÂY
     */
    window.abandonQuiz = function() {
        if (confirm("Bạn có chắc chắn muốn dừng bài làm tại đây không? Số câu đúng của bạn sẽ được lưu lại.")) {
            showResult(true);
        }
    }

    function showResult(isAbandoned = false) {
        bgMusic.pause();
        document.getElementById('quiz-content').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        if (isAbandoned) {
            document.getElementById('result-title').innerText = "Đã dừng bài làm!";
        } else {
            document.getElementById('result-title').innerText = "Hoàn thành!";
        }

        document.getElementById('score-summary').innerText = `Kết quả của bạn: ${correctOnFirstTry}/${questions.length} câu đúng tuyệt đối.`;
        document.getElementById('snd-congrats').play();
    }
</script>
</body>
</html>
