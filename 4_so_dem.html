<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thử thách Nghe Số 0-20 - Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00cec9;
            --secondary: #6c5ce7;
            --success: #2ecc71;
            --error: #ff7675;
            --hint: #fdcb6e;
            --bg: #f8f9fa;
            --text-main: #2d3436;
            --text-sub: #636E72;
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

        body { 
            font-family: 'Quicksand', sans-serif; 
            background: var(--bg); 
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; color: var(--text-main); overflow-x: hidden;
        }

        /* --- LOGIN UI: CLEAN, PURPLE & LONG CARD --- */
        #login-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }

        .login-card {
            background: #FFFFFF;
            padding: 5.5rem 3.5rem;
            border-radius: 3rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 540px; width: 90%;
            display: flex; flex-direction: column; gap: 3.5rem; 
        }

        .login-header { display: flex; flex-direction: column; gap: 1.2rem; }
        .login-header h2 { font-size: 2.2rem; font-weight: 700; color: var(--secondary); margin: 0; letter-spacing: -1px; line-height: 1.2; }
        .login-header p { color: var(--text-sub); font-size: 1.15rem; margin: 0; font-weight: 500; line-height: 1.6; }

        .google-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 14px;
            background: #FFFFFF; color: var(--text-main); border: 1.5px solid #E5E7EB;
            padding: 1rem 3rem; border-radius: 100px; cursor: pointer;
            font-weight: 700; font-size: 1.05rem; font-family: inherit;
        }
        .google-btn:hover { border-color: var(--secondary); background: #F8F7FF; transform: translateY(-3px); }

        #login-msg { color: var(--error); font-size: 0.95rem; font-weight: 700; min-height: 1.4rem; }

        /* --- TRANG GIỚI THIỆU (WELCOME) --- */
        #welcome-screen { display: none; width: 100%; max-width: 650px; text-align: center; }
        .welcome-card { background: white; padding: 50px; border-radius: 3rem; box-shadow: 0 15px 35px rgba(0,0,0,0.08); }
        .welcome-icon { font-size: 80px; display: block; margin-bottom: 20px; animation: bounce 2s infinite; }
        
        /* --- GAME UI --- */
        #main-game { display: none; width: 100%; max-width: 750px; }
        .game-card { background: white; width: 100%; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); padding: 40px; text-align: center; position: relative; }
        
        h1 { color: var(--secondary); margin-bottom: 5px; font-size: 1.8rem; font-weight: 700; }
        .instruction { color: #636e72; font-style: italic; margin-bottom: 20px; }

        .display-word { min-height: 80px; margin-bottom: 25px; padding: 15px; background: #f0f7ff; border-radius: 15px; border: 2px solid #e1f0ff; }
        #word-text { font-size: 2.2rem; font-weight: bold; color: var(--secondary); display: block; text-transform: capitalize; }
        #phonetic-text { font-size: 1.3rem; color: #0984e3; font-style: italic; display: block; margin-top: 5px; }

        .audio-controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .btn-play { 
            width: 80px; height: 80px; border-radius: 50%; background: var(--primary); border: none; cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 206, 201, 0.3); display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-play:hover { transform: scale(1.1); }
        .btn-play svg { fill: white; width: 40px; height: 40px; }

        .btn-hint { padding: 12px 20px; border-radius: 15px; border: 2px solid var(--hint); background: white; color: #d35400; font-weight: bold; cursor: pointer; font-family: inherit; }

        .numbers-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin: 30px 0; }
        .num-btn { padding: 15px 0; font-size: 1.4rem; font-weight: bold; border: 2px solid #dfe6e9; border-radius: 12px; background: white; color: #2d3436; cursor: pointer; outline: none; font-family: inherit; }
        .num-btn.correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .num-btn.wrong { background: var(--error) !important; color: white; border-color: var(--error); animation: shake 0.4s; }
        .num-btn.highlight { background: var(--hint) !important; color: white; border-color: var(--hint); transform: scale(1.1); }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .progress-bar { height: 10px; background: #eee; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        #progress-fill { height: 100%; background: var(--secondary); width: 0%; transition: 0.4s; }

        #result-screen { display: none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .result-gif { width: 220px; border-radius: 15px; margin-bottom: 15px; }
        .btn-main { padding: 18px 45px; border-radius: 100px; border: none; background: var(--secondary); color: white; font-weight: 800; cursor: pointer; font-size: 1.1rem; margin-top: 20px; font-family: inherit; box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3); }

        .balloon { position: fixed; bottom: -120px; width: 50px; height: 70px; border-radius: 50%; z-index: 999; animation: floatUp 5s linear forwards; pointer-events: none; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120vh); opacity: 0; } }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <div class="login-header">
            <h2>Hệ Thống Trực Tuyến</h2>
            <p>Vui lòng đăng nhập để bắt đầu thử thách luyện nghe con số của bạn.</p>
        </div>
        <button id="login-btn" class="google-btn">Tiếp tục với Google</button>
        <div id="login-msg"></div>
    </div>
</div>

<div id="welcome-screen">
    <div class="welcome-card">
        <span class="welcome-icon">🎧</span>
        <h1 style="font-size: 2.2rem; margin-bottom: 15px;">Chào mừng bạn!</h1>
        <p style="color: #636e72; font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px;">
            Nghe phát âm và chọn số tương ứng từ 0 đến 20. Sẵn sàng chưa?
        </p>
        <button class="btn-main" onclick="startGame()">BẮT ĐẦU CHƠI 🚀</button>
    </div>
</div>

<div id="main-game">
    <div class="game-card">
        <div id="game-content">
            <h1>Thử thách Nghe Số 0-20 🎧</h1>
            <p class="instruction">Nghe kỹ phát âm và chọn số tương ứng.</p>

            <div class="display-word">
                <span id="word-text">...</span>
                <span id="phonetic-text">...</span>
            </div>

            <div class="audio-controls">
                <button class="btn-play" onclick="playCurrentNumber()">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>
                <button class="btn-hint" onclick="showHint()">💡 Gợi ý</button>
            </div>

            <div class="numbers-grid" id="grid"></div>

            <div style="text-align: left; font-weight: bold; color: #888; font-size: 0.9rem;">TIẾN ĐỘ: <span id="progress-text">1 / 15</span></div>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>

        <div id="result-screen">
            <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExamhuOW92OWVlYzcyajB4Z2hlNDZ3aDZqNTRjYzMxbnVhd2Vjbnp0ayZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o6fIUZTTDl0IDjbZS/giphy.gif" class="result-gif">
            <h2 id="res-title">Kết quả</h2>
            <h3 id="res-score" style="font-size: 2.5rem; color: var(--secondary); margin: 10px 0; font-weight: 800;">Đúng 0 / 15 câu</h3>
            <p id="res-msg" style="color: #636e72; margin: 15px 0 25px; line-height: 1.6; font-weight: 500;"></p>
            <button class="btn-main" onclick="location.reload()">Chơi lại từ đầu</button>
        </div>
    </div>
</div>

<audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
<audio id="snd-win" src="https://tiengdong.com/wp-content/uploads/Am-thanh-chuc-mung-chien-thang-www_tiengdong_com.mp3?_=1"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdlTVHwiLOGMnrFe12DE1dQSEHZaJ594I",
        authDomain: "nguyen-am-tieng-anh.firebaseapp.com",
        projectId: "nguyen-am-tieng-anh",
        storageBucket: "nguyen-am-tieng-anh.firebasestorage.app",
        messagingSenderId: "878440633705",
        appId: "1:878440633705:web:755de6cb273eb139ebd9f8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    document.getElementById("login-btn").onclick = async () => {
        const msg = document.getElementById("login-msg");
        msg.innerText = "Đang kiểm tra quyền truy cập...";
        try {
            const res = await signInWithPopup(auth, provider);
            const q = query(collection(db, "Tienganh_so_cap"), where("email", "==", res.user.email));
            const snap = await getDocs(q);

            if (!snap.empty) {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("welcome-screen").style.display = "block";
            } else {
                msg.innerText = "Tài khoản không được phép truy cập!";
                await signOut(auth);
            }
        } catch (e) {
            msg.innerText = "Lỗi đăng nhập hoặc cửa sổ bị đóng.";
        }
    };
</script>

<script>
    const numberData = {
        0: ["Zero", "/ˈzɪərəʊ/"], 1: ["One", "/wʌn/"], 2: ["Two", "/tuː/"], 3: ["Three", "/θriː/"], 4: ["Four", "/fɔː/"],
        5: ["Five", "/faɪv/"], 6: ["Six", "/sɪks/"], 7: ["Seven", "/ˈsev.ən/"], 8: ["Eight", "/eɪt/"], 9: ["Nine", "/naɪn/"],
        10: ["Ten", "/ten/"], 11: ["Eleven", "/ɪˈlev.ən/"], 12: ["Twelve", "/twelv/"], 13: ["Thirteen", "/ˌθɜːˈtiːn/"],
        14: ["Fourteen", "/ˌfɔːˈtiːn/"], 15: ["Fifteen", "/ˌfɪfˈtiːn/"], 16: ["Sixteen", "/ˌsɪkˈstiːn/"],
        17: ["Seventeen", "/ˌsev.ənˈtiːn/"], 18: ["Eighteen", "/ˌeɪˈtiːn/"], 19: ["Nineteen", "/ˌnaɪnˈtiːn/"], 20: ["Twenty", "/ˈtwen.ti/"]
    };

    let questions = [];
    let currentStep = 0;
    let score = 0;
    let targetNum = null;
    let canClick = true;
    let hintUsed = false;

    function startGame() {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('main-game').style.display = 'block';
        initGame();
    }

    function initGame() {
        // Xáo trộn mảng để tránh lặp lại số 8 nhiều lần
        let keys = Object.keys(numberData);
        keys.sort(() => Math.random() - 0.5);
        questions = keys.slice(0, 15);

        currentStep = 0;
        score = 0;

        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 0; i <= 20; i++) {
            const btn = document.createElement('button');
            btn.className = 'num-btn';
            btn.id = 'btn-' + i;
            btn.innerText = i;
            btn.onclick = () => checkAnswer(i, btn);
            grid.appendChild(btn);
        }
        loadQuestion();
    }

    function loadQuestion() {
        if (currentStep >= 15) { finishGame(); return; }
        canClick = true;
        hintUsed = false;
        targetNum = questions[currentStep];
        
        document.getElementById('word-text').innerText = numberData[targetNum][0];
        document.getElementById('phonetic-text').innerText = numberData[targetNum][1];
        document.getElementById('progress-text').innerText = `${currentStep + 1} / 15`;
        document.getElementById('progress-fill').style.width = `${(currentStep / 15) * 100}%`;
        
        document.querySelectorAll('.num-btn').forEach(b => b.className = 'num-btn');
        playCurrentNumber();
    }

    function playCurrentNumber() {
        if (targetNum === null) return;
        const synth = window.speechSynthesis;
        
        // Fix lỗi kẹt: Ngắt mọi câu thoại cũ trước khi nói câu mới
        synth.cancel(); 

        // Fix lỗi đọc số 8: Truyền chữ tiếng Anh (vd: "Eight") thay vì số thô
        const utter = new SpeechSynthesisUtterance(numberData[targetNum][0]);
        utter.lang = 'en-US';
        utter.rate = 0.85;
        synth.speak(utter);
    }

    function showHint() {
        if (!canClick) return;
        hintUsed = true;
        const btn = document.getElementById('btn-' + targetNum);
        btn.classList.add('highlight');
        setTimeout(() => btn.classList.remove('highlight'), 1200);
    }

    function checkAnswer(num, btn) {
        if (!canClick) return;
        if (num == targetNum) {
            canClick = false;
            if (!hintUsed) score++;
            btn.classList.add('correct');
            document.getElementById('snd-correct').play().catch(()=>{});
            setTimeout(() => { currentStep++; loadQuestion(); }, 1000);
        } else {
            btn.classList.add('wrong');
            document.getElementById('snd-wrong').play().catch(()=>{});
            setTimeout(() => btn.classList.remove('wrong'), 500);
        }
    }

    function finishGame() {
        document.getElementById('game-content').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('res-score').innerText = `Đúng ${score} / 15 câu`;
        
        const title = document.getElementById('res-title');
        const msg = document.getElementById('res-msg');

        if (score === 15) {
            title.innerText = "Tuyệt vời! 🌟";
            msg.innerHTML = "Bạn là thiên tài số học! Không có con số nào làm khó được bạn cả.";
            createBalloons();
        } else if (score >= 8) {
            title.innerText = "Làm tốt lắm! ✌️";
            msg.innerHTML = "Bạn đã nắm khá vững rồi. Luyện tập thêm để đạt điểm tuyệt đối nhé!";
        } else {
            title.innerText = "Cố gắng lên! 💪";
            msg.innerHTML = "Đừng nản chí, hãy làm lại để ghi nhớ tốt hơn nhé!";
        }
        document.getElementById('snd-win').play().catch(()=>{});
    }

    function createBalloons() {
        const colors = ['#ff7675', '#74b9ff', '#55efc4', '#ffeaa7', '#a29bfe'];
        for (let i = 0; i < 50; i++) {
            const b = document.createElement('div');
            b.className = 'balloon';
            b.style.left = Math.random() * 100 + 'vw';
            b.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            b.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 6000);
        }
    }
</script>

</body>
</html>
