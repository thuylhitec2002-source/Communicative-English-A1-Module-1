<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdlTVHwiLOGMnrFe12DE1dQSEHZaJ594I",
        authDomain: "nguyen-am-tieng-anh.firebaseapp.com",
        projectId: "nguyen-am-tieng-anh",
        storageBucket: "nguyen-am-tieng-anh.firebasestorage.app",
        messagingSenderId: "878440633705",
        appId: "1:878440633705:web:755de6cb273eb139ebd9f8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // --- TÍNH NĂNG TỰ ĐỘNG KIỂM TRA ĐĂNG NHẬP ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // Nếu đã có user, kiểm tra quyền trong Firestore
            const allowed = await checkAccess(user.email);
            if (allowed) {
                showWelcomeScreen();
            } else {
                await signOut(auth);
            }
        }
    });

    async function checkAccess(email) {
        const q = query(collection(db, "Tienganh_so_cap"), where("email", "==", email));
        const snap = await getDocs(q);
        return !snap.empty;
    }

    function showWelcomeScreen() {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("welcome-screen").style.display = "block";
    }

    // --- XỬ LÝ KHI BẤM NÚT ĐĂNG NHẬP ---
    document.getElementById("login-btn").onclick = async () => {
        const msg = document.getElementById("login-msg");
        msg.innerText = "Đang kết nối với Google...";
        try {
            const res = await signInWithPopup(auth, provider);
            const allowed = await checkAccess(res.user.email);

            if (allowed) {
                showWelcomeScreen();
            } else {
                msg.innerText = "Tài khoản không được phép truy cập!";
                await signOut(auth);
            }
        } catch (e) {
            msg.innerText = "Lỗi đăng nhập hoặc cửa sổ bị đóng.";
        }
    };
</script>
