<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Flashcards - Interactive Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #3498db;
            --primary-dark: #2980b9;
            --bg: #f0f7fa;
            --card-bg: #ffffff;
            --text: #2d3436;
            --shadow: 0 8px 15px rgba(0,0,0,0.05);
            --shadow-h: 0 15px 30px rgba(52, 152, 219, 0.2);
            --error: #ff7675;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .container { width: 100%; max-width: 900px; text-align: center; }

        /* --- LOGIN STYLES --- */
        #game-container { 
            background: white; border-radius: 30px; width: 100%; max-width: 420px; padding: 40px; text-align: center; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1); margin: 0 auto;
        }
        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.4s; }
        
        .google-btn {
            background: white; color: #2d3436; border: 1px solid #dfe6e9; padding: 1rem 2rem; border-radius: 50px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: bold; margin: 20px auto;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); transition: 0.3s; width: 100%;
        }
        .google-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 20px rgba(0,0,0,0.1); }
        .btn-logout {
            background: #eee; color: #666; border: none; padding: 8px 15px; border-radius: 10px;
            cursor: pointer; font-size: 12px; font-weight: bold; margin-top: 15px;
        }

        /* --- FLASHCARD STYLES (Giữ nguyên của bạn) --- */
        .header { margin-bottom: 30px; }
        .header h1 { font-size: 2.8rem; color: var(--primary-dark); margin: 0; }
        .header p { color: #7f8c8d; font-size: 1.1rem; }

        #list-screen { background: white; padding: 30px; border-radius: 30px; box-shadow: var(--shadow); }
        .grid-items { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 15px; 
            margin: 25px 0; 
            max-height: 60vh;
            overflow-y: auto;
            padding: 10px;
        }
        .item-box { 
            padding: 20px; background: #fff; border-radius: 15px; cursor: pointer; 
            font-weight: 600; border: 1px solid #eee; border-bottom: 4px solid #eee; 
            transition: all 0.2s; color: var(--text);
        }
        .item-box:hover { 
            transform: translateY(-5px); 
            border-color: var(--primary); 
            background: #fdfdfd; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        }

        #flashcard-section { display: none; max-width: 600px; margin: 0 auto; }
        .progress-container {
            width: 100%; height: 8px; background: #e0e0e0; border-radius: 10px;
            margin-bottom: 25px; overflow: hidden;
        }
        .progress-bar {
            height: 100%; width: 0%; background: var(--primary);
            transition: width 0.3s ease;
        }

        .card-container { perspective: 1200px; width: 100%; height: 420px; margin-bottom: 25px; }
        .card {
            position: relative; width: 100%; height: 100%; 
            transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .card.flipped { transform: rotateY(180deg); }
        
        .front, .back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 40px; border-radius: 30px; box-shadow: var(--shadow); box-sizing: border-box; background: white;
        }
        .front { border: 2px solid #f1f2f6; }
        .back { transform: rotateY(180deg); border: 3px solid var(--primary); }

        .term-main { font-size: 2.8rem; font-weight: 800; color: var(--primary-dark); margin-bottom: 10px; }
        .ipa { font-size: 1.4rem; color: #95a5a6; margin-bottom: 20px; font-family: 'Arial', sans-serif; }
        .speaker-icon { font-size: 3rem; cursor: pointer; transition: 0.2s; }
        .speaker-icon:hover { transform: scale(1.1); }

        .mean-text { font-size: 2rem; color: #2ecc71; font-weight: 700; margin-bottom: 20px; }
        .ex-box { background: #f9f9f9; padding: 15px; border-radius: 15px; width: 100%; }
        .ex-text { font-size: 1.3rem; color: #2d3436; font-weight: 600; line-height: 1.4; }
        .ex-vi { font-size: 1.1rem; color: #7f8c8d; margin-top: 10px; font-style: italic; }

        .nav-controls { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .btn-action {
            padding: 12px 25px; border: none; border-radius: 15px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            background: var(--primary); color: white; transition: 0.2s;
        }
        .btn-home { background: #636e72; }
        .btn-flip {
            width: 60px; height: 60px; border-radius: 50%; border: none;
            background: #e1f5fe; color: var(--primary); font-size: 1.5rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        #congrats-screen { display: none; background: white; padding: 50px; border-radius: 30px; box-shadow: var(--shadow); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen" class="screen active">
        <div id="game-container">
            <h1 style="color: var(--primary-dark); margin-bottom: 10px;">DAILY PHRASES</h1>
            <p style="color: #636e72;">Vui lòng đăng nhập để bắt đầu học</p>
            <button id="login-btn" class="google-btn">
                <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59L2.56 13.22C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path></svg>
                Tiếp tục với Google
            </button>
            <p id="login-msg" style="color: var(--error); font-size: 0.9rem; font-weight: bold;"></p>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <div id="list-screen">
            <div class="header">
                <h2 id="user-welcome" style="color: var(--primary); font-size: 1.2rem; margin-bottom: 10px;"></h2>
                <h1>Daily Phrases</h1>
                <p>Chọn một từ để bắt đầu hoặc <b style="color:var(--primary); cursor:pointer" onclick="startAll()">Học tất cả</b></p>
                <button id="logout-btn" class="btn-logout">ĐĂNG XUẤT</button>
            </div>
            <div id="items-grid" class="grid-items"></div>
        </div>

        <div id="flashcard-section">
            <div class="progress-container">
                <div class="progress-bar" id="p-bar"></div>
            </div>

            <div class="card-container">
                <div class="card" id="main-card" onclick="flipCard()">
                    <div class="front">
                        <div id="display-term" class="term-main"></div>
                        <div id="display-ipa" class="ipa"></div>
                        <div class="speaker-icon" onclick="speak(event)">🔊</div>
                        <p style="margin-top: 30px; color: #bdc3c7; font-size: 0.9rem;">Chạm để xem nghĩa</p>
                    </div>
                    <div class="back">
                        <div class="mean-text" id="display-mean"></div>
                        <div class="ex-box">
                            <div id="display-ex" class="ex-text"></div>
                            <div id="display-ex-vi" class="ex-vi"></div>
                        </div>
                        <div class="speaker-icon" style="margin-top: 15px; font-size: 2rem;" onclick="speak(event)">🔊</div>
                    </div>
                </div>
            </div>

            <div class="nav-controls">
                <button class="btn-action btn-home" onclick="goHome()">🏠 Menu</button>
                <button class="btn-action" onclick="prev()">Trước</button>
                <button class="btn-flip" onclick="flipCard(event)">🔄</button>
                <button class="btn-action" onclick="next()">Tiếp</button>
            </div>
        </div>

        <div id="congrats-screen">
            <h1>Hoàn thành! 🎉</h1>
            <p>Bạn đã xem hết các thẻ học hôm nay.</p>
            <button class="btn-action" style="margin-top: 20px;" onclick="goHome()">Quay lại danh sách</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdlTVHwiLOGMnrFe12DE1dQSEHZaJ594I",
        authDomain: "nguyen-am-tieng-anh.firebaseapp.com",
        projectId: "nguyen-am-tieng-anh",
        storageBucket: "nguyen-am-tieng-anh.firebasestorage.app",
        messagingSenderId: "878440633705",
        appId: "1:878440633705:web:755de6cb273eb139ebd9f8",
        measurementId: "G-EM8Y1QW6QH"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // Kiểm tra quyền truy cập từ Firestore
    async function checkAccess(email) {
        const q = query(collection(db, "Tienganh_so_cap"), where("email", "==", email));
        const snap = await getDocs(q);
        return !snap.empty;
    }

    // Tự động kiểm tra trạng thái đăng nhập
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const allowed = await checkAccess(user.email);
            if (allowed) {
                document.getElementById("login-screen").classList.remove("active");
                document.getElementById("main-content").style.display = "block";
                document.getElementById("user-welcome").innerText = "Chào " + user.displayName + "!";
                initList();
            } else {
                document.getElementById("login-msg").innerText = "Email không có quyền truy cập.";
                await signOut(auth);
            }
        } else {
            document.getElementById("login-screen").classList.add("active");
            document.getElementById("main-content").style.display = "none";
        }
    });

    // Xử lý nút đăng nhập
    document.getElementById("login-btn").onclick = async () => {
        const msg = document.getElementById("login-msg");
        msg.innerText = "Đang kiểm tra quyền truy cập...";
        try {
            const res = await signInWithPopup(auth, provider);
            const allowed = await checkAccess(res.user.email);
            if (!allowed) {
                msg.innerText = "Email không có quyền truy cập.";
                await signOut(auth);
            }
        } catch (e) {
            msg.innerText = "Lỗi đăng nhập hoặc bị hủy.";
        }
    };

    // Xử lý nút đăng xuất
    document.getElementById("logout-btn").onclick = async () => {
        await signOut(auth);
        location.reload(); 
    };
</script>

<script>
    const database = [
        { term: "What's up", ipa: "/wɒts ʌp/", mean: "Gì thế, xin chào, hi", ex: "Hey! What's up? Long time no see.", vi: "Này! Có chuyện gì thế? Lâu rồi không gặp." },
        { term: "Have a job to do", ipa: "/hæv ə dʒɒb/", mean: "Bận, có công chuyện", ex: "I have a job to do for my mother this evening.", vi: "Tối nay tớ có việc phải làm giúp mẹ rồi." },
        { term: "Oh, what a pity", ipa: "/əʊ wɒt ə ˈpɪti/", mean: "Tiếc thế", ex: "You can't come? Oh, what a pity!", vi: "Bạn không đến được à? Ôi, tiếc quá!" },
        { term: "Next time", ipa: "/nekst taɪm/", mean: "Lần sau nhé", ex: "I'm sorry for you, next time!", vi: "Rất tiếc cho bạn, để lần sau nhé!" },
        { term: "Cancel", ipa: "/ˈkænsəl/", mean: "Hủy (hẹn)", ex: "Maybe it's better to cancel with Jack and Robert too?", vi: "Có lẽ tốt hơn là cũng nên hủy hẹn với cả Jack và Robert nhỉ?" },
        { term: "I don't know what to say", ipa: "/aɪ dəʊnt nəʊ/", mean: "Tôi không biết phải nói gì hơn", ex: "I don't know what to say. Sorry mate.", vi: "Tớ cũng không biết nói gì hơn. Xin lỗi bạn hiền." },
        { term: "No worries", ipa: "/nəʊ ˈwʌriz/", mean: "Không sao đâu", ex: "No worries, we can do it later.", vi: "Không sao đâu, chúng ta có thể làm việc đó sau." },
        { term: "See you", ipa: "/siː juː/", mean: "Hẹn gặp lại", ex: "See you tomorrow at work.", vi: "Hẹn gặp lại bạn ngày mai ở chỗ làm nhé." },
        { term: "Are you busy", ipa: "/ɑːr juː ˈbɪzi/", mean: "Bạn có bận không?", ex: "Are you busy this evening or this weekend?", vi: "Tối nay hoặc cuối tuần này bạn có bận không?" },
        { term: "A doubles game", ipa: "/ə ˈdʌblz ɡeɪm/", mean: "Chơi đôi (2 người mỗi đội)", ex: "A doubles game with Jack and Robert.", vi: "Một trận đánh đôi với Jack và Robert." },
        { term: "Have a problem", ipa: "/hæv ə ˈprɒbləm/", mean: "Có chút vấn đề, có việc", ex: "Eddie has a problem and he can't come.", vi: "Eddie có chút việc bận nên anh ấy không đến được." },
        { term: "Can you take his place", ipa: "/teɪk hɪz pleɪs/", mean: "Bạn có thể thay thế anh ấy không?", ex: "He's sick. Can you take his place?", vi: "Anh ấy ốm rồi. Bạn có thể chơi thay chỗ anh ấy không?" },
        { term: "Free / Available", ipa: "/friː / əˈveɪləbl/", mean: "Rảnh", ex: "I'm free tonight.", vi: "Tối nay tớ rảnh." },
        { term: "Racket", ipa: "/ˈrækɪt/", mean: "Vợt (tennis, cầu lông...)", ex: "I don't have a racket.", vi: "Tớ không có vợt." },
        { term: "Either", ipa: "/ˈaɪðər/", mean: "Cũng không (phủ định)", ex: "I can't play tennis either.", vi: "Tớ cũng không biết chơi tennis." },
        { term: "Perfect for", ipa: "/ˈpɜːrfɪkt fɔːr/", mean: "Rất phù hợp với...", ex: "You're perfect for this dress.", vi: "Bạn rất hợp với bộ váy này đấy." },
        { term: "Just for fun", ipa: "/dʒʌst fɔ fʌn/", mean: "Cho vui thôi", ex: "Don't be serious, it's just for fun!", vi: "Đừng nghiêm trọng quá, chỉ là vui thôi mà!" },
        { term: "What time is...?", ipa: "/wɒt taɪm ɪz/", mean: "Khi nào thì... diễn ra?", ex: "What time is the game?", vi: "Mấy giờ thì trận đấu bắt đầu?" }
    ];

    let curIdx = 0;

    function initList() {
        const grid = document.getElementById('items-grid');
        if (!grid) return;
        grid.innerHTML = '';
        database.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'item-box';
            div.textContent = item.term;
            div.onclick = () => { curIdx = i; showCard(); };
            grid.appendChild(div);
        });
    }

    function showCard() {
        document.getElementById('list-screen').style.display = 'none';
        document.getElementById('flashcard-section').style.display = 'block';
        document.getElementById('congrats-screen').style.display = 'none';
        updateCardContent();
    }

    function updateCardContent() {
        const item = database[curIdx];
        const card = document.getElementById('main-card');
        card.classList.remove('flipped');
        
        document.getElementById('display-term').textContent = item.term;
        document.getElementById('display-ipa').textContent = item.ipa;
        document.getElementById('display-mean').textContent = item.mean;
        document.getElementById('display-ex').textContent = item.ex;
        document.getElementById('display-ex-vi').textContent = item.vi;

        const progress = ((curIdx + 1) / database.length) * 100;
        document.getElementById('p-bar').style.width = progress + '%';
    }

    window.flipCard = function(e) {
        if(e) e.stopPropagation();
        document.getElementById('main-card').classList.toggle('flipped');
    }

    window.next = function() {
        if (curIdx < database.length - 1) {
            curIdx++;
            updateCardContent();
        } else {
            finish();
        }
    }

    window.prev = function() {
        if (curIdx > 0) {
            curIdx--;
            updateCardContent();
        }
    }

    window.startAll = function() {
        curIdx = 0;
        showCard();
    }

    window.goHome = function() {
        document.getElementById('list-screen').style.display = 'block';
        document.getElementById('flashcard-section').style.display = 'none';
        document.getElementById('congrats-screen').style.display = 'none';
    }

    function finish() {
        document.getElementById('flashcard-section').style.display = 'none';
        document.getElementById('congrats-screen').style.display = 'block';
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
    }

    window.speak = function(e) {
        if(e) e.stopPropagation();
        const item = database[curIdx];
        const card = document.getElementById('main-card');
        const text = card.classList.contains('flipped') ? item.ex : item.term;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }
</script>
</body>
</html>
