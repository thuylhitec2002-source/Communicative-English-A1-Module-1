<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Mastery - Elite Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4834d4;
            --secondary: #686de0;
            --accent: #ff9f43;
            --success: #2ecc71;
            --error: #ff7675;
            --bg: #f0f3f7;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(#d1d8e0 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; color: #2d3436;
        }

        #game-container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            width: 100%;
            max-width: 480px;
            min-height: 600px;
            padding: 50px 35px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
            position: relative;
            margin: 20px;
        }

        /* --- HEADER & NAVIGATION --- */
        .btn-back {
            position: absolute;
            top: 25px; left: 25px;
            background: white; border: 1px solid #eee;
            padding: 8px 15px; border-radius: 15px;
            cursor: pointer; font-weight: 700; color: var(--secondary);
            font-size: 14px; display: flex; align-items: center; gap: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            z-index: 10;
        }
        .btn-back:hover { background: var(--secondary); color: white; transform: translateX(-5px); }

        .screen { display: none; }
        .active { display: block; animation: slideUp 0.5s ease; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 26px; font-weight: 800; color: var(--primary); margin-bottom: 30px; letter-spacing: -0.5px; }

        /* --- MENU --- */
        .menu-grid { display: grid; gap: 18px; margin-top: 20px; }
        .menu-btn {
            background: white; border: none; padding: 22px; border-radius: 20px;
            cursor: pointer; font-weight: 700; text-align: left;
            font-family: inherit; font-size: 16px; color: #444;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 8px 15px rgba(0,0,0,0.04);
        }
        .menu-btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 12px 20px rgba(104, 109, 224, 0.2);
            color: var(--primary);
        }
        .menu-btn::after { content: '→'; font-size: 20px; color: var(--secondary); opacity: 0.5; }

        /* --- PLAYING AREA --- */
        .btn-play-audio {
            background: #2d3436; color: white; border: none;
            width: 90px; height: 90px; border-radius: 50%;
            cursor: pointer; margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            font-size: 30px;
        }
        .btn-play-audio:hover { transform: scale(1.1) rotate(5deg); background: var(--primary); }

        .option-btn {
            background: white; border: 2px solid #f1f2f6;
            padding: 16px; border-radius: 18px;
            cursor: pointer; font-size: 18px; margin-bottom: 12px;
            width: 100%; font-weight: 700; font-family: inherit;
            box-shadow: 0 4px 0 #f1f2f6;
        }
        .option-btn:hover { border-color: var(--secondary); color: var(--secondary); transform: translateY(-3px); box-shadow: 0 7px 0 #f1f2f6; }
        .option-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #f1f2f6; }

        .correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; box-shadow: 0 4px 0 #27ae60 !important; }
        .wrong { background: var(--error) !important; color: white !important; border-color: var(--error) !important; box-shadow: 0 4px 0 #c0392b !important; animation: shake 0.4s; }

        .input-box {
            width: 100%; padding: 18px; border-radius: 20px;
            border: 3px solid #eee; font-size: 22px; text-align: center;
            margin-bottom: 20px; outline: none; font-family: inherit; font-weight: 700;
        }
        .input-box:focus { border-color: var(--secondary); background: #f8faff; }

        .status-header { display: flex; justify-content: space-between; margin-bottom: 25px; font-weight: 700; color: #a5b1c2; font-size: 14px; text-transform: uppercase; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        /* --- PROGRESS BAR --- */
        .progress-container { height: 8px; background: #eee; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.5s ease; }

        .btn-confirm {
            background: var(--accent); color: white; border: none;
            padding: 15px 40px; border-radius: 15px; font-weight: 800;
            cursor: pointer; width: 100%; font-size: 16px; box-shadow: 0 6px 0 #e67e22;
        }
        .btn-confirm:active { transform: translateY(3px); box-shadow: 0 3px 0 #e67e22; }
    </style>
</head>
<body>

<div id="game-container">
    <button id="global-back" class="btn-back" style="display:none" onclick="goHome()">← QUAY LẠI</button>

    <div id="login-screen" class="screen active">
        <div style="font-size: 60px; margin-bottom: 10px;">🎧</div>
        <h1>SPELLING MASTER</h1>
        <p style="color: #7f8c8d; margin-bottom: 40px;">Học đánh vần tiếng Anh chuyên nghiệp</p>
        <button id="login-btn" class="btn-confirm" style="background: var(--primary); box-shadow: 0 6px 0 #2c2cbb;">Đăng nhập Google</button>
        <p id="login-msg" style="color:var(--error); margin-top:15px; font-weight:700"></p>
    </div>

    <div id="menu-screen" class="screen">
        <h1 id="user-welcome" style="margin-bottom: 10px;">Xin chào!</h1>
        <p style="color: #7f8c8d; margin-bottom: 30px;">Chọn chế độ luyện tập của bạn</p>
        <div class="menu-grid">
            <button class="menu-btn" onclick="startMode('mcq')">Trắc nghiệm khách quan</button>
            <button class="menu-btn" onclick="startMode('fill')">Hoàn thành từ đục lỗ</button>
            <button class="menu-btn" onclick="startMode('dictation')">Nghe chép chính tả</button>
            <button class="menu-btn" onclick="startMode('mixed')" style="background: #efebff;">Bài kiểm tra tổng hợp</button>
        </div>
    </div>

    <div id="play-screen" class="screen">
        <div class="status-header">
            <span id="q-count">Câu 1/10</span>
            <span id="score-count" style="color: var(--success)">Đúng: 0</span>
        </div>
        
        <button class="btn-play-audio" onclick="playSound()">🔈</button>
        
        <div id="game-area"></div>
        <div id="action-area" style="margin-top: 20px;"></div>

        <div class="progress-container">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
    </div>

    <div id="end-screen" class="screen">
        <div style="font-size: 80px;">🏆</div>
        <h1>XUẤT SẮC!</h1>
        <h2 id="final-score" style="font-size: 48px; color: var(--primary); margin: 0;">0/10</h2>
        <p style="color: #7f8c8d; margin: 20px 0 40px;">Bạn đã hoàn thành bài thi một cách tuyệt vời.</p>
        <button class="btn-confirm" onclick="goHome()">VỀ MỤC LỤC</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    
    // Giữ nguyên Config của bạn
    const firebaseConfig = { apiKey: "AIzaSyCdlTVHwiLOGMnrFe12DE1dQSEHZaJ594I", authDomain: "nguyen-am-tieng-anh.firebaseapp.com", projectId: "nguyen-am-tieng-anh" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const provider = new GoogleAuthProvider();

    onAuthStateChanged(auth, (user) => { 
        if (user) { 
            document.getElementById('user-welcome').innerText = "Chào, " + user.displayName + "!"; 
            showScreen('menu-screen'); 
        } 
    });

    document.getElementById("login-btn").onclick = () => signInWithPopup(auth, provider);

    // DỮ LIỆU CÂU HỎI
    const dataRepo = [
        { word: "Mary", options: ["Mary", "Mali", "Magy", "Marry"] },
        { word: "Anna", options: ["Anna", "Affa", "Amma", "Assa"] },
        { word: "Patricia", options: ["Patricia", "Patricit", "Pataica", "Patrica"] },
        { word: "Sophia", options: ["Sophia", "Xophia", "Sopaia", "Sofia"] },
        { word: "Amelia", options: ["Amelia", "Hmelia", "Amilie", "Ameria"] },
        { word: "Barbara", options: ["Barbara", "Beabare", "Berpara", "Belbare"] },
        { word: "Elizabeth", options: ["Elizabeth", "Ilizebith", "Elizabith", "Alizebeth"] },
        { word: "Jennifer", options: ["Jennifer", "Gennifer", "Jinnefer", "Gennafer"] }
    ];

    let questions = [], currentIdx = 0, score = 0, currentType = '';
    
    // Hệ thống âm thanh (File mp3 trong thư mục) 
    const sfxCorrect = new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3');
    const sfxWrong = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');
    const sfxWin = new Audio('https://tiengdong.com/wp-content/uploads/Am-thanh-chuc-mung-chien-thang-www_tiengdong_com.mp3?_=1');

    window.showScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('global-back').style.display = (id === 'play-screen') ? 'block' : 'none';
    };

    window.goHome = () => showScreen('menu-screen');

    window.startMode = (m) => {
        currentIdx = 0; score = 0;
        if (m === 'mixed') {
            let p1 = [...dataRepo].sort(() => .5-Math.random()).slice(0,5).map(o => ({...o, type:'mcq'}));
            let p2 = [...dataRepo].sort(() => .5-Math.random()).slice(0,5).map(o => ({...o, type:'fill'}));
            let p3 = [...dataRepo].sort(() => .5-Math.random()).slice(0,5).map(o => ({...o, type:'dictation'}));
            questions = [...p1, ...p2, ...p3];
        } else {
            questions = [...dataRepo].sort(() => .5-Math.random()).map(o => ({...o, type: m}));
        }
        showScreen('play-screen'); loadQuestion();
    };

    window.playSound = () => {
        const q = questions[currentIdx];
        // Gọi file mp3 theo tên đáp án đúng (Ví dụ: Sophia.mp3)
        const audio = new Audio(`${q.word}.mp3`);
        audio.play().catch(e => console.log("Không tìm thấy file: " + q.word + ".mp3"));
    };

    function loadQuestion() {
        const q = questions[currentIdx];
        document.getElementById('q-count').innerText = `Câu ${currentIdx + 1}/${questions.length}`;
        document.getElementById('score-count').innerText = `Đúng: ${score}`;
        document.getElementById('progress-fill').style.width = `${(currentIdx / questions.length) * 100}%`;
        
        const area = document.getElementById('game-area');
        const action = document.getElementById('action-area');
        area.innerHTML = ''; action.innerHTML = '';

        if (q.type === 'mcq') {
            [...q.options].sort(() => .5-Math.random()).forEach(opt => {
                const btn = document.createElement('button'); btn.className = 'option-btn'; btn.innerText = opt;
                btn.onclick = () => check(opt === q.word, btn); area.appendChild(btn);
            });
        } else if (q.type === 'fill') {
            let display = q.word.split('').map((c, i) => i % 2 === 1 ? '_' : c).join(' ');
            area.innerHTML = `<h2 style="letter-spacing:8px; font-size:35px; margin-bottom:20px">${display}</h2>`;
            const input = document.createElement('input'); input.className = 'input-box'; input.placeholder = 'Nhập đáp án...';
            area.appendChild(input);
            const sub = document.createElement('button'); sub.className = 'btn-confirm'; sub.innerText = 'KIỂM TRA';
            sub.onclick = () => check(input.value.trim().toLowerCase() === q.word.toLowerCase(), input);
            action.appendChild(sub);
        } else {
            const input = document.createElement('input'); input.className = 'input-box'; input.placeholder = 'Nghe và chép lại...';
            area.appendChild(input);
            const sub = document.createElement('button'); sub.className = 'btn-confirm'; sub.innerText = 'GỬI';
            sub.onclick = () => check(input.value.trim().toLowerCase() === q.word.toLowerCase(), input);
            action.appendChild(sub);
        }
        setTimeout(window.playSound, 600);
    }

    function check(isCorrect, el) {
    // Vô hiệu hóa tất cả nút để tránh bấm nhiều lần khi đang chờ chuyển câu
    const btns = document.querySelectorAll('.option-btn, .btn-confirm');
    btns.forEach(b => b.style.pointerEvents = 'none');

    if (isCorrect) {
        el.classList.add('correct');
        // Reset âm thanh về 0 để phát ngay lập tức (quan trọng)
        sfxCorrect.currentTime = 0; 
        sfxCorrect.play().catch(e => console.log("Audio block"));
        score++;
    } else {
        el.classList.add('wrong');
        sfxWrong.currentTime = 0;
        sfxWrong.play().catch(e => console.log("Audio block"));
    }

    // Đợi 1.2 giây để người dùng thấy đáp án rồi mới chuyển câu
    setTimeout(() => {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showScreen('end-screen');
            document.getElementById('final-score').innerText = `${score}/${questions.length}`;
            sfxWin.currentTime = 0;
            sfxWin.play().catch(e => console.log("Audio block"));
        }
    }, 1200);
}
</script>
</body>
</html>
