<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis Conversation - Listening Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366F1;
            --bg-soft: #F0F4FF;
            --success: #10B981;
            --error: #EF4444;
            --text: #1E1B4B;
            --card: #FFFFFF;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-soft);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        #quiz-app {
            background: var(--card);
            width: 95%;
            max-width: 600px;
            padding: 35px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.1);
            text-align: center;
        }

        /* Login Screen Styles */
        .google-btn {
            background: white; color: #2d3436; border: 1px solid #dfe6e9; padding: 1rem 2rem; border-radius: 50px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: bold; margin: 20px auto;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); transition: 0.3s; width: 100%;
        }
        .google-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 20px rgba(0,0,0,0.1); }
        .btn-logout {
            background: #eee; color: #666; border: none; padding: 8px 15px; border-radius: 10px;
            cursor: pointer; font-size: 12px; font-weight: bold; margin-top: 15px;
        }

        /* Quiz Styles */
        .progress-bar {
            height: 8px; background: #E5E7EB; border-radius: 10px;
            margin: 20px 0; overflow: hidden;
        }
        #progress-fill { height: 100%; width: 0; background: var(--primary); transition: 0.4s; }

        .screen { display: none; }
        .active { display: block; animation: slideIn 0.4s ease; }
        
        h2 { font-size: 1.4rem; line-height: 1.4; margin-bottom: 25px; color: var(--primary); }
        
        .options-grid { display: grid; gap: 12px; }
        .opt-btn {
            padding: 18px;
            border: 2px solid #F3F4F6;
            border-radius: 15px;
            background: #FFF;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text);
            text-align: left;
        }
        .opt-btn:hover:not(:disabled) { border-color: var(--primary); background: #F9FAFF; }
        .correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background: var(--error) !important; color: white; border-color: var(--error); }

        #explanation {
            margin-top: 25px;
            padding: 20px;
            background: #FDFBFF;
            border-radius: 15px;
            border-left: 5px solid var(--primary);
            text-align: left;
            display: none;
        }
        .expl-label { font-weight: 700; font-size: 1.1rem; display: block; margin-bottom: 5px; }
        .quote { display: block; margin-top: 10px; font-style: italic; color: #4F46E5; font-size: 0.95rem; opacity: 0.8; }

        .btn-action {
            margin-top: 25px;
            padding: 15px 40px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="quiz-app">
    <div id="login-screen" class="screen active">
        <div style="font-size: 60px;">🔐</div>
        <h1>Listening Quiz</h1>
        <p>Vui lòng đăng nhập để bắt đầu bài kiểm tra.</p>
        <button id="login-btn" class="google-btn">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59L2.56 13.22C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path></svg>
            Tiếp tục với Google
        </button>
        <p id="login-msg" style="color: var(--error); font-size: 0.9rem; font-weight: bold;"></p>
    </div>

    <div id="start-screen" class="screen">
        <div style="font-size: 60px;">🎧</div>
        <h2 id="user-welcome" style="margin-bottom: 5px;"></h2>
        <h1>Listening Challenge</h1>
        <p>Listen to the conversation and choose the best answers.</p>
        <button class="btn-action" onclick="startQuiz()">Start Quiz</button>
        <br>
        <button id="logout-btn" class="btn-logout">ĐĂNG XUẤT</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <p id="q-counter" style="font-weight: bold; color: #888;"></p>
        <h2 id="q-text"></h2>
        <div class="options-grid" id="options"></div>

        <div id="explanation">
            <span id="feedback-text" class="expl-label"></span>
            <p id="expl-vn" style="margin: 0; color: #4B5563; line-height: 1.5;"></p>
            <span class="quote" id="expl-en"></span>
        </div>

        <button class="btn-action" id="btn-next" onclick="nextQuestion()" style="display: none;">Next Question</button>
    </div>

    <div id="result-screen" class="screen">
        <h1>Your Result</h1>
        <div style="font-size: 3.5rem; font-weight: 800; color: var(--primary);" id="final-score"></div>
        <p id="result-msg"></p>
        <button class="btn-action" onclick="location.reload()">Try Again</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdlTVHwiLOGMnrFe12DE1dQSEHZaJ594I",
        authDomain: "nguyen-am-tieng-anh.firebaseapp.com",
        projectId: "nguyen-am-tieng-anh",
        storageBucket: "nguyen-am-tieng-anh.firebasestorage.app",
        messagingSenderId: "878440633705",
        appId: "1:878440633705:web:755de6cb273eb139ebd9f8",
        measurementId: "G-EM8Y1QW6QH"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // 1. Kiểm tra trạng thái đăng nhập
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const allowed = await checkAccess(user.email);
            if (allowed) {
                document.getElementById("user-welcome").innerText = "Chào " + user.displayName + "!";
                showScreen('start-screen');
            } else {
                document.getElementById("login-msg").innerText = "Email không có quyền truy cập.";
                await signOut(auth);
            }
        } else {
            showScreen('login-screen');
        }
    });

    // 2. Kiểm tra quyền truy cập Firestore
    async function checkAccess(email) {
        const q = query(collection(db, "Tienganh_so_cap"), where("email", "==", email));
        const snap = await getDocs(q);
        return !snap.empty;
    }

    // 3. Xử lý nút đăng nhập
    document.getElementById("login-btn").onclick = async () => {
        const msg = document.getElementById("login-msg");
        msg.innerText = "Đang kiểm tra...";
        try {
            const res = await signInWithPopup(auth, provider);
            const allowed = await checkAccess(res.user.email);
            if (!allowed) {
                msg.innerText = "Email không có quyền truy cập.";
                await signOut(auth);
            }
        } catch (e) {
            msg.innerText = "Lỗi đăng nhập.";
        }
    };

    // 4. Xử lý nút đăng xuất
    document.getElementById("logout-btn").onclick = async () => {
        await signOut(auth);
        location.reload(); 
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>

<script>
    const sfxCorrect = new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3');
    const sfxWrong = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');

    const quizData = [
        {
            q: "Why can't Eddie play tennis this evening?",
            options: ["He has a problem with Jack.", "He has to do a job for his mother.", "He is feeling sick.", "He doesn't have a racket."],
            correct: 1,
            vn: "Eddie bận việc giúp mẹ nên không thể đi đánh tennis.",
            en: "I have a job to do for my mother this evening."
        },
        {
            q: "Where will Danny and Eddie see each other tomorrow?",
            options: ["At the park.", "At Jack's house.", "At university.", "At the sports center."],
            correct: 2,
            vn: "Họ hẹn gặp lại nhau ở trường đại học vào ngày mai.",
            en: "See you tomorrow at university."
        },
        {
            q: "Danny is asking Ruby to join a...",
            options: ["Singles game.", "Double date.", "Doubles game.", "Tennis lesson."],
            correct: 2,
            vn: "Danny rủ Ruby chơi trận đánh đôi cùng với Jack và Robert.",
            en: "A doubles game with Jack and Robert."
        },
        {
            q: "Does Ruby have a tennis racket?",
            options: ["Yes, but it's old.", "No, she hasn't got one anymore.", "Yes, she has two.", "No, she lost it at the park."],
            correct: 1,
            vn: "Ruby nói cô ấy không còn cái vợt nào nữa.",
            en: "I haven't got a racket anymore."
        },
        {
            q: "What does Danny say about Jack's physical ability?",
            options: ["He can't run.", "He can't see.", "He is too fast.", "He is a professional."],
            correct: 0,
            vn: "Danny trêu là Jack không thể chạy nổi.",
            en: "And Jack can't run..."
        },
        {
            q: "What is Robert's problem according to Danny?",
            options: ["He doesn't like tennis.", "He has no racket.", "He can't see the ball.", "He is too busy."],
            correct: 2,
            vn: "Robert thì bị trêu là không nhìn thấy bóng.",
            en: "And Robert can't see the ball."
        },
        {
            q: "Why does Danny say Ruby is 'perfect for the group'?",
            options: ["Because she is a pro.", "Because the group plays just for fun.", "Because she has two rackets.", "Because she is Eddie's sister."],
            correct: 1,
            vn: "Danny nói Ruby hoàn hảo cho nhóm vì nhóm này chơi chỉ để vui (ai cũng chơi dở).",
            en: "You're perfect for the group. It's just for fun."
        },
        {
            q: "What time does the game start?",
            options: ["At 5:00.", "At 6:00.", "At 7:00.", "At 8:00."],
            correct: 1,
            vn: "Trận đấu diễn ra vào lúc 6 giờ.",
            en: "What time is the game? At six."
        },
        {
            q: "How will Ruby get a racket?",
            options: ["She will buy one.", "Danny will lend her one.", "Jack will give her one.", "She will find one at university."],
            correct: 2,
            vn: "Jack có 2 cái vợt nên anh ấy sẽ cho Ruby mượn 1 cái.",
            en: "Jack has two rackets, he can give you one."
        },
        {
            q: "What was Ruby's initial response when Danny asked if she was busy?",
            options: ["She said she was very busy.", "She asked why he wanted to know.", "She said she was going to the park.", "She didn't answer."],
            correct: 1,
            vn: "Ruby đề phòng hỏi ngược lại 'Tại sao? Anh muốn gì?' trước khi trả lời.",
            en: "Why? What do you want?"
        }
    ];

    let currentQ = 0;
    let score = 0;

    function startQuiz() {
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('quiz-screen').classList.add('active');
        showQuestion();
    }

    function showQuestion() {
        const data = quizData[currentQ];
        document.getElementById('progress-fill').style.width = `${(currentQ / quizData.length) * 100}%`;
        document.getElementById('q-counter').innerText = `Question ${currentQ + 1} of ${quizData.length}`;
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('btn-next').style.display = 'none';

        const optContainer = document.getElementById('options');
        optContainer.innerHTML = '';

        data.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn);
            optContainer.appendChild(btn);
        });
    }

    function checkAnswer(idx, btn) {
        const data = quizData[currentQ];
        const allBtns = document.querySelectorAll('.opt-btn');
        allBtns.forEach(b => b.disabled = true);

        if (idx === data.correct) {
            btn.classList.add('correct');
            sfxCorrect.play().catch(e => {});
            score++;
            document.getElementById('feedback-text').innerText = "Correct! ✨";
            document.getElementById('feedback-text').style.color = "var(--success)";
        } else {
            btn.classList.add('wrong');
            sfxWrong.play().catch(e => {});
            allBtns[data.correct].classList.add('correct');
            document.getElementById('feedback-text').innerText = "Incorrect! ❌";
            document.getElementById('feedback-text').style.color = "var(--error)";
        }

        document.getElementById('expl-vn').innerText = data.vn;
        document.getElementById('expl-en').innerText = `Evidence: "${data.en}"`;
        document.getElementById('explanation').style.display = 'block';
        document.getElementById('btn-next').style.display = 'inline-block';
    }

    function nextQuestion() {
        currentQ++;
        if (currentQ < quizData.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        document.getElementById('final-score').innerText = `${score}/${quizData.length}`;
        document.getElementById('result-msg').innerText = score >= 7 ? "Great job! Your listening skills are sharp." : "Keep practicing! Listen again to improve.";
    }
</script>
</body>
</html>
