<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thử thách Nguyên âm - Purple Clean Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #6C5CE7;
            --text-main: #2D3436;
            --text-sub: #636E72;
            --bg-body: #F0F2F5;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body { 
            font-family: 'Quicksand', sans-serif; 
            background-color: var(--bg-body); 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- LOGIN UI --- */
        #login-screen {
            position: fixed; inset: 0;
            background: var(--bg-body);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }

        .login-card {
            background: #FFFFFF;
            padding: 4rem 2rem;
            border-radius: 2.5rem;
            box-shadow: 0 15px 50px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        .login-header h2 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-purple);
            margin: 0 0 1.2rem 0;
            letter-spacing: -0.8px;
        }

        .login-header p {
            color: var(--text-sub);
            font-size: 1.1rem;
            margin-bottom: 3rem;
            font-weight: 500;
        }

        .google-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #FFFFFF;
            color: var(--text-main);
            border: 1.5px solid #E0E0E0;
            padding: 0.9rem 2.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            font-family: inherit;
        }

        .google-btn:hover {
            border-color: var(--primary-purple);
            background: #F8F7FF;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.1);
            transform: translateY(-2px);
        }

        #login-msg {
            margin-top: 1.5rem;
            color: #D63031;
            font-size: 0.9rem;
            font-weight: 700;
            min-height: 1.2rem;
        }

        /* --- GAME CONTENT --- */
        #main-content { display: none; width: 100%; max-width: 500px; padding: 20px; flex-direction: column; }
        .quiz-container { 
            background: white; border-radius: 2rem; padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
        }
        .progress-bar { height: 8px; background: #EEE; border-radius: 10px; margin-bottom: 2rem; overflow: hidden; }
        #progress { height: 100%; background: var(--primary-purple); width: 0%; transition: 0.5s; }
        .options { display: flex; flex-direction: column; gap: 1rem; margin: 2rem 0; }
        .opt-btn { 
            padding: 1.2rem; border: 2px solid #F0F2F5; border-radius: 1rem; 
            background: white; cursor: pointer; font-size: 1.1rem; font-weight: 700; font-family: inherit;
        }
        .opt-btn:hover:not(:disabled) { border-color: var(--primary-purple); background: #F8F7FF; }
        .correct { background: #E6FFFA !important; border-color: #38B2AC !important; color: #234E52; }
        .wrong { background: #FFF5F5 !important; border-color: #FC8181 !important; color: #742A2A; }
        .nav-btn { width: 100%; padding: 1.2rem; border-radius: 1rem; border: none; background: var(--primary-purple); color: white; font-weight: 700; cursor: pointer; font-size: 1rem; font-family: inherit; }
        #next-btn:disabled { background: #E0E0E0; cursor: not-allowed; }
        #quiz-content, #result-screen { display: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <div class="login-header">
            <h2>Thử thách Nguyên âm</h2>
            <p>Vui lòng đăng nhập để làm bài tập</p>
        </div>
        
        <button id="login-btn" class="google-btn">
            <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59L2.56 13.22C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
            </svg>
            Tiếp tục với Google
        </button>
        
        <div id="login-msg"></div>
    </div>
</div>

<div id="main-content">
    <div class="quiz-container">
        <div id="quiz-content">
            <div class="progress-bar"><div id="progress"></div></div>
            <h2 id="question-text" style="font-size: 1.2rem; margin-bottom: 1.5rem; line-height: 1.4;"></h2>
            <div class="options" id="options-container"></div>
            <button id="next-btn" class="nav-btn" onclick="goNext()" disabled>Câu tiếp theo</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <div style="font-size: 4rem; margin-bottom: 1rem;">🎉</div>
            <h2 style="margin-bottom: 0.5rem; color: var(--primary-purple);">Hoàn thành!</h2>
            <div id="score-summary" style="margin-bottom: 2rem; color: var(--text-sub); font-weight: 700;"></div>
            <button class="nav-btn" onclick="location.reload()">Làm lại bài tập</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdlTVHwiLOGMnrFe12DE1dQSEHZaJ594I",
        authDomain: "nguyen-am-tieng-anh.firebaseapp.com",
        projectId: "nguyen-am-tieng-anh",
        storageBucket: "nguyen-am-tieng-anh.firebasestorage.app",
        messagingSenderId: "878440633705",
        appId: "1:878440633705:web:755de6cb273eb139ebd9f8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    document.getElementById("login-btn").onclick = async () => {
        const msg = document.getElementById("login-msg");
        msg.innerText = "Đang kiểm tra quyền truy cập...";
        try {
            const res = await signInWithPopup(auth, provider);
            const q = query(collection(db, "Tienganh_so_cap"), where("email", "==", res.user.email));
            const snap = await getDocs(q);

            if (!snap.empty) {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("main-content").style.display = "flex";
                // Kích hoạt game ngay sau khi login
                window.loadQuestion(); 
            } else {
                msg.innerText = "Email không có trong danh sách được phép!";
                await signOut(auth);
            }
        } catch (e) {
            msg.innerText = "Lỗi đăng nhập hoặc cửa sổ bị đóng.";
            console.error(e);
        }
    };
</script>

<script>
    // Để Script module gọi được hàm này, ta gán vào window
    const questions = [
        { q: "1. She _____ from Naples.", options: ["are", "is"], correct: 1 },
        { q: "2. They _____ from Italy.", options: ["are", "is"], correct: 0 },
        { q: "3. I _____ English, I am Australian.", options: ["not am", "am not"], correct: 1 }
    ];

    let currentIdx = 0;
    let score = 0;
    let isAnswered = false;

    window.loadQuestion = function() {
        isAnswered = false;
        const q = questions[currentIdx];
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('progress').style.width = `${((currentIdx + 1) / questions.length) * 100}%`;
        document.getElementById('quiz-content').style.display = 'block';
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                if (isAnswered) return;
                isAnswered = true;
                if (index === q.correct) {
                    btn.classList.add('correct');
                    score++;
                } else {
                    btn.classList.add('wrong');
                    container.children[q.correct].classList.add('correct');
                }
                document.getElementById('next-btn').disabled = false;
            };
            container.appendChild(btn);
        });
        document.getElementById('next-btn').disabled = true;
    }

    window.goNext = function() {
        if (currentIdx < questions.length - 1) {
            currentIdx++;
            loadQuestion();
        } else {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('score-summary').innerText = `Kết quả: ${score} / ${questions.length} câu đúng`;
        }
    }
</script>
</body>
</html>
