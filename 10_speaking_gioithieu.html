<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speaking Master - Elite Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #6366f1; --success: #10b981; --error: #f43f5e; 
            --warning: #f59e0b; --bg: #f8faff; --glass: rgba(255, 255, 255, 0.9);
        }
        
        * { box-sizing: border-box; transition: all 0.25s ease; font-family: 'Lexend', sans-serif; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }

        .card { 
            background: var(--glass); backdrop-filter: blur(20px); 
            width: 95%; max-width: 580px; padding: 50px 45px; 
            border-radius: 40px; border: 1px solid rgba(255,255,255,1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center; position: relative;
        }

        .vi-hint { font-size: 1.5rem; font-weight: 800; color: #1e293b; margin-bottom: 10px; display: block; }
        .en-q-display { font-size: 1.6rem; font-weight: 700; color: var(--primary); margin-bottom: 30px; display: none; line-height: 1.4; }

        /* --- MIC BEVEL DESIGN (Nhẹ nhàng hơn) --- */
        .mic-btn {
            background: var(--success); color: white; border: none;
            width: 90px; height: 90px; border-radius: 50%; font-size: 40px;
            cursor: pointer; position: relative;
            box-shadow: 0 4px 0 #059669, 0 8px 15px rgba(16, 185, 129, 0.2); /* Hiệu ứng Bevel mỏng */
            margin: 20px 0;
        }
        .mic-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #059669; }
        .mic-btn.active { background: var(--error); animation: pulse 1s infinite; box-shadow: 0 0 25px var(--error); }

        .btn-group { display: flex; justify-content: center; gap: 12px; margin-top: 15px; }
        .action-btn {
            border: none; padding: 10px 18px; border-radius: 12px;
            font-weight: 700; cursor: pointer; font-size: 0.85rem;
            display: flex; align-items: center; gap: 6px; background: #fff; border: 1px solid #eee;
        }
        .btn-replay { color: var(--primary); }
        .btn-hint { color: #b45309; }

        .btn-skip { background: none; border: none; color: #94a3b8; font-weight: 700; cursor: pointer; text-decoration: underline; margin-top: 20px; display: block; width: 100%; font-size: 0.95rem; }

        /* --- NÚT XÁC NHẬN ĐỌC XONG --- */
        .btn-confirm { 
            background: #2d3436; color: white; border: none; padding: 14px 30px; 
            border-radius: 15px; font-weight: 800; cursor: pointer; width: 100%; 
            margin-top: 25px; font-size: 1rem; letter-spacing: 1px;
            box-shadow: 0 4px 0 #000;
        }
        .btn-confirm:hover { background: #000; }

        .status { margin-top: 25px; font-weight: 800; color: #64748b; font-size: 1.1rem; }
        .user-said { color: #6366f1; font-size: 0.95rem; margin-top: 15px; font-style: italic; font-weight: 600; min-height: 25px; }

        .btn-next { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 18px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 30px; font-size: 1.2rem; }

        .google-btn { display: inline-flex; align-items: center; gap: 10px; background: white; color: #3c4043; border: 1px solid #dadce0; padding: 10px 24px; border-radius: 100px; cursor: pointer; font-weight: 600; margin-top: 35px; }

        .hidden { display: none !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="login-screen" class="card">
        <h1 style="color: var(--primary); font-weight: 800;">SPEAKING MASTER</h1>
        <button id="login-btn" class="google-btn">
            <svg viewBox="0 0 48 48" width="18"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59L2.56 13.22C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path></svg>
            Đăng nhập với Google
        </button>
    </div>

    <div id="start-screen" class="card hidden">
        <h1 id="user-welcome" style="color: var(--primary);">Chào bạn!</h1>
        <p style="color: #64748b; margin-bottom: 30px;">Hãy tự tin nói vào Micro nhé.</p>
        <button class="btn-next" onclick="startGame()">BẮT ĐẦU NGAY ➔</button>
    </div>

    <div id="test-screen" class="card hidden">
        <div id="q-area">
            <span class="vi-hint" id="vi-hint">...</span>
            <span class="en-q-display" id="en-q-display">...</span>
        </div>

        <button class="mic-btn" id="btnMic">🎙️</button>
        <div class="status" id="status">Chuẩn bị...</div>
        <div class="user-said" id="user-said"></div>
        
        <button id="btnConfirm" class="btn-confirm hidden" onclick="finalizeResult()">XÁC NHẬN KẾT QUẢ ✅</button>

        <div class="btn-group">
            <button class="action-btn btn-replay" onclick="autoReadQuestion()">🔈 Nghe câu hỏi</button>
            <button class="action-btn btn-hint" onclick="showHint()">💡 Gợi ý</button>
        </div>

        <button id="btnNext" class="btn-next hidden" onclick="goNext()">TIẾP THEO ➔</button>
        <button class="btn-skip" id="btnSkip" onclick="goNext()">Bỏ qua câu này ➔</button>

        <button class="google-btn" style="margin-top:25px; padding: 8px 20px; font-size:0.8rem" onclick="logout()">Đăng xuất</button>
    </div>
</div>

<audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="snd-wrong" src="https://tiengdong.com/wp-content/uploads/Am-thanh-tra-loi-sai-www_tiengdong_com.mp3?_=1"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCdlTVHwiLOGMnrFe12DE1dQSEHZaJ594I", authDomain: "nguyen-am-tieng-anh.firebaseapp.com", projectId: "nguyen-am-tieng-anh", storageBucket: "nguyen-am-tieng-anh.firebasestorage.app", messagingSenderId: "878440633705", appId: "1:878440633705:web:755de6cb273eb139ebd9f8" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const q = query(collection(db, "Tienganh_so_cap"), where("email", "==", user.email));
            const snap = await getDocs(q);
            if (!snap.empty) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('start-screen').classList.remove('hidden');
                document.getElementById('user-welcome').innerText = "Chào " + user.displayName + "!";
            } else { await signOut(auth); }
        }
    });

    document.getElementById("login-btn").onclick = () => signInWithPopup(auth, provider);
    window.logout = () => { signOut(auth).then(() => location.reload()); };

    const data = [
        { q: "What is your name?", vi: "Hãy giới thiệu tên của bạn", en: "My name is [Name]", reg: /^((my name is|my name's)\s)?[a-z\s]+$/i },
        { q: "How do you spell your name?", vi: "Đánh vần tên bạn thế nào?", en: "It's [A-B-C...]", reg: /^((it is|it's)\s)?([a-z]\s?)+$/i },
        { q: "How old are you?", vi: "Bạn bao nhiêu tuổi?", en: "I am [Age] years old", reg: /^((i am|i'm)\s)?\d+(\syears\sold)?$/i },
        { q: "What is your nationality?", vi: "Quốc tịch của bạn?", en: "I am [Nationality]", 
            // FIXED: Không chấp nhận "Vietnam", bắt buộc kết thúc bằng "ese", "ian", "ish" hoặc tương tự
            reg: /^((i am|i'm)\s)?[a-z]+(ese|ian|ish|ch|an)$/i },
        { q: "Which city do you live in?", vi: "Bạn sống ở thành phố nào?", en: "I live in [City]", reg: /^((it is|it's|i live in)\s)?[a-z\s]+$/i },
        { q: "What is your phone number?", vi: "Số điện thoại của bạn?", en: "It's [Phone Number]", reg: /^((it is|it's)\s)?\d{7,15}$/i },
        { q: "What is your email address?", vi: "Địa chỉ Email của bạn?", en: "It's [Email Address]", reg: /^((it is|it's)\s)?[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$/i },
        { q: "What is your address?", vi: "Địa chỉ của bạn là gì?", en: "It's [Address]", reg: /^((it is|it's)\s)?[a-z0-9\s,./-]+$/i }
    ];

    let currentIdx = 0, recognition, finalTranscript = "";

    window.startGame = () => {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('test-screen').classList.remove('hidden');
        initRecognition();
        loadQuestion();
    };

    function initRecognition() {
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRec();
        recognition.lang = 'en-US';
        recognition.continuous = false; 

        recognition.onstart = () => { 
            document.getElementById('btnMic').classList.add('active'); 
            document.getElementById('status').innerText = "Đang lắng nghe...";
            document.getElementById('btnConfirm').classList.add('hidden');
        };
        
        recognition.onresult = (e) => {
            let text = e.results[0][0].transcript.toLowerCase().trim();
            
            // XỬ LÝ EMAIL: Xóa mọi khoảng trắng và chuẩn hóa
            if (data[currentIdx].q.includes("email")) {
                text = text.replace(/\s+/g, ""); // Xóa sạch khoảng trắng
                text = text.replace(/at/g, "@").replace(/dot/g, ".");
            } else {
                text = text.replace(/\sat\s/g, "@").replace(/\sdot\s/g, ".");
                text = text.replace(/\sslash\s/g, "/").replace(/\sover\s/g, "/");
            }
            
            if (data[currentIdx].q.includes("phone")) {
                text = text.replace(/-/g, "").replace(/\s+/g, "");
            }

            finalTranscript = text.replace(/[.,!?]$/, "");
            document.getElementById('user-said').innerText = `Kết quả: "${finalTranscript}"`;
            document.getElementById('btnConfirm').classList.remove('hidden'); // Hiện nút xác nhận
            document.getElementById('status').innerText = "Đã nghe xong. Hãy xác nhận!";
        };
        recognition.onend = () => document.getElementById('btnMic').classList.remove('active');
    }

    function loadQuestion() {
        const q = data[currentIdx];
        document.getElementById('vi-hint').innerText = q.vi;
        document.getElementById('en-q-display').innerText = q.q;
        document.getElementById('en-q-display').style.display = 'none';
        document.getElementById('status').innerText = "Nghe câu hỏi...";
        document.getElementById('btnNext').classList.add('hidden');
        document.getElementById('btnConfirm').classList.add('hidden');
        document.getElementById('user-said').innerText = "";
        finalTranscript = "";
        autoReadQuestion();
    }

    window.finalizeResult = () => {
        if (!finalTranscript) return;
        checkAnswer(finalTranscript);
    };

    window.autoReadQuestion = () => {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(data[currentIdx].q);
        utter.lang = 'en-US';
        utter.onend = () => { document.getElementById('status').innerText = "Chạm Mic để trả lời"; };
        window.speechSynthesis.speak(utter);
    };

    window.showHint = () => {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(data[currentIdx].en.replace(/\[|\]/g, ""));
        utter.lang = 'en-US';
        window.speechSynthesis.speak(utter);
    };

    function checkAnswer(text) {
        if (data[currentIdx].reg.test(text)) {
            document.getElementById('snd-correct').play();
            document.getElementById('status').innerText = "CHÍNH XÁC! 🎉";
            document.getElementById('status').style.color = "var(--success)";
            document.getElementById('en-q-display').style.display = 'block';
            document.getElementById('btnNext').classList.remove('hidden');
            document.getElementById('btnConfirm').classList.add('hidden');
        } else {
            document.getElementById('snd-wrong').play();
            document.getElementById('status').innerText = "Chưa khớp cấu trúc!";
            document.getElementById('status').style.color = "var(--error)";
        }
    }

    window.goNext = () => {
        currentIdx++;
        if (currentIdx < data.length) { 
            document.getElementById('status').style.color = "#64748b"; 
            loadQuestion(); 
        } else { 
            alert("Chúc mừng! Bạn đã hoàn thành bài tập."); 
            location.reload(); 
        }
    };

    document.getElementById('btnMic').onclick = () => { 
        window.speechSynthesis.cancel(); 
        recognition.start(); 
    };
</script>
</body>
</html>
