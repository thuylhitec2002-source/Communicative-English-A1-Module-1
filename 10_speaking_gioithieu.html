<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speaking Practice Pro - Clean 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --success: #10b981; /* Xanh lá */
            --error: #f43f5e;
            --bg: #eff6ff;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }

        body {
            font-family: 'Lexend', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle, #dbeafe 1px, transparent 1px);
            background-size: 24px 24px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; overflow: hidden;
        }

        /* --- HIỆU ỨNG ĐUNG ĐƯA NHẸ --- */
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .card {
            background: var(--card-bg);
            width: 90%;
            max-width: 460px;
            padding: 60px 40px;
            border-radius: 45px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            text-align: center;
            position: relative;
            animation: floating 5s ease-in-out infinite;
            border: 1px solid rgba(255,255,255,1);
        }

        /* Hiệu ứng nổi lên khi di chuột tới */
        .card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 30px 60px rgba(99, 102, 241, 0.1);
        }

        .vi-q { font-size: 1.7rem; font-weight: 800; color: #1e293b; display: block; margin-bottom: 12px; line-height: 1.3; }
        .en-m { color: var(--primary); font-style: italic; font-size: 1.1rem; margin-bottom: 40px; display: block; font-weight: 600; opacity: 0.8; }

        /* --- NÚT MIC XANH LÁ 3D --- */
        .mic-btn {
            background: var(--success);
            color: white;
            border: none;
            width: 95px; height: 95px;
            border-radius: 50%;
            font-size: 42px;
            cursor: pointer;
            box-shadow: 0 10px 0 #059669; /* Đổ bóng khối phía dưới */
            margin-bottom: 20px;
            display: inline-flex; align-items: center; justify-content: center;
            position: relative;
        }

        .mic-btn:hover { transform: translateY(-3px); box-shadow: 0 13px 0 #059669; }

        .mic-btn:active, .mic-btn.active {
            transform: translateY(8px);
            box-shadow: 0 2px 0 #059669;
        }

        .mic-btn.active {
            background: var(--error);
            box-shadow: 0 2px 0 #9f1239;
            animation: pulse 1s infinite alternate;
        }
        
        @keyframes pulse { from { transform: scale(1) translateY(8px); } to { transform: scale(1.1) translateY(8px); } }

        .status { margin-top: 25px; font-weight: 700; color: #64748b; letter-spacing: 0.5px; font-size: 0.95rem; }

        .correction-box {
            background: #fff1f2; color: #9f1239;
            padding: 20px; border-radius: 20px;
            margin-top: 25px; font-size: 0.95rem;
            display: none; border: 2px solid #fecaca;
            text-align: left; line-height: 1.6;
        }

        .btn-next {
            background: var(--primary);
            color: white; border: none;
            padding: 18px; border-radius: 22px;
            font-weight: 800; cursor: pointer;
            width: 100%; margin-top: 35px;
            box-shadow: 0 8px 0 #4338ca;
            font-family: inherit; font-size: 1.1rem;
        }
        .btn-next:active { transform: translateY(4px); box-shadow: 0 2px 0 #4338ca; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
        .error-shake { animation: shake 0.4s !important; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card">
        <h1 style="color: var(--primary); font-size: 2.2rem; margin-bottom: 10px;">SPEAKING MASTER</h1>
        <p style="color: #64748b; margin-bottom: 40px; font-weight: 500;">Tự động đọc hướng dẫn & Phản hồi 3D.</p>
        <button id="login-btn" class="btn-next" style="display:block">Đăng nhập với Google</button>
        <p id="login-msg" style="color:var(--error); margin-top:20px; font-weight:700;"></p>
    </div>
</div>

<div id="test-screen" class="card hidden">
    <div id="q-area">
        <span class="vi-q" id="vi-q">...</span>
        <span class="en-m" id="en-m">...</span>
    </div>

    <button class="mic-btn" id="btnMic">🎙️</button>
    <div class="status" id="status">Đang chuẩn bị...</div>
    
    <div id="correction-box" class="correction-box"></div>
    <div id="user-said" style="color:#94a3b8; font-size:0.85rem; margin-top:18px; font-style:italic; font-weight:500"></div>
    
    <button id="btnNext" class="btn-next hidden" onclick="goNext()">TIẾP THEO ➔</button>
    <button id="logout-btn" style="background:none; border:none; color:#cbd5e1; margin-top:30px; cursor:pointer; font-weight:700; font-size:0.8rem; letter-spacing:1px">ĐĂNG XUẤT</button>
</div>

<audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="snd-wrong" src="https://tiengdong.com/wp-content/uploads/Am-thanh-tra-loi-sai-www_tiengdong_com.mp3?_=1"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdlTVHwiLOGMnrFe12DE1dQSEHZaJ594I",
        authDomain: "nguyen-am-tieng-anh.firebaseapp.com",
        projectId: "nguyen-am-tieng-anh",
        storageBucket: "nguyen-am-tieng-anh.firebasestorage.app",
        messagingSenderId: "878440633705",
        appId: "1:878440633705:web:755de6cb273eb139ebd9f8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const q = query(collection(db, "Tienganh_so_cap"), where("email", "==", user.email));
            const snap = await getDocs(q);
            if (!snap.empty) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('test-screen').classList.remove('hidden');
                initGame();
            } else { await signOut(auth); }
        }
    });

    document.getElementById("login-btn").onclick = async () => {
        try { await signInWithPopup(auth, provider); } catch (e) { }
    };
    document.getElementById("logout-btn").onclick = () => { signOut(auth); location.reload(); };

    // --- GAME LOGIC ---
    const data = [
        { vi: "Hãy giới thiệu tên của bạn.", en: "My name is [Name].", reg: /^my name (is|'s) [a-z\s]+$/i, errorMsg: "Cấu trúc đúng: 'My name is [Tên của bạn]'." },
        { vi: "Bạn bao nhiêu tuổi?", en: "I am [Số] years old.", reg: /^i (am|'m) \d+ years old$/i, errorMsg: "Cấu trúc đúng: 'I am [Số] years old'." },
        { vi: "Quốc tịch của bạn?", en: "I am from [Country].", reg: /^i (am|'m) from [a-z\s]+$/i, errorMsg: "Cấu trúc đúng: 'I am from [Tên nước]'." }
    ];

    let currentIdx = 0, recognition;

    function initGame() {
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRec();
        recognition.lang = 'en-US';
        
        recognition.onstart = () => {
            window.speechSynthesis.cancel();
            document.getElementById('btnMic').classList.add('active');
            document.getElementById('status').innerText = "Đang nghe bạn nói...";
        };

        recognition.onresult = (e) => {
            const text = e.results[0][0].transcript.toLowerCase().trim().replace(/[.,!?]$/, "");
            document.getElementById('user-said').innerText = `Máy nghe: "${text}"`;
            checkAnswer(text);
        };

        recognition.onend = () => document.getElementById('btnMic').classList.remove('active');
        
        loadQuestion();
    }

    function loadQuestion() {
        const q = data[currentIdx];
        document.getElementById('vi-q').innerText = q.vi;
        document.getElementById('en-m').innerText = "Mẫu: " + q.en;
        document.getElementById('status').innerText = "Chăm chú lắng nghe...";
        document.getElementById('btnNext').classList.add('hidden');
        document.getElementById('correction-box').style.display = 'none';
        document.getElementById('user-said').innerText = "";
        
        autoReadGuide();
    }

    // TỰ ĐỘNG ĐỌC MẪU KHÔNG CẦN BẤM
    function autoReadGuide() {
        window.speechSynthesis.cancel();
        const q = data[currentIdx];
        const utterVi = new SpeechSynthesisUtterance(q.vi);
        utterVi.lang = 'vi-VN';
        
        const utterEn = new SpeechSynthesisUtterance(q.en.replace(/\[|\]/g, ""));
        utterEn.lang = 'en-US';
        utterEn.rate = 0.85;

        utterVi.onend = () => window.speechSynthesis.speak(utterEn);
        utterEn.onend = () => { document.getElementById('status').innerText = "Chạm Mic để trả lời"; };
        
        window.speechSynthesis.speak(utterVi);
    }

    function checkAnswer(text) {
        const q = data[currentIdx];
        const card = document.getElementById('test-screen');
        
        if (q.reg.test(text)) {
            document.getElementById('snd-correct').play();
            document.getElementById('status').innerText = "TUYỆT VỜI! 🎉";
            document.getElementById('status').style.color = "var(--success)";
            document.getElementById('btnNext').classList.remove('hidden');
        } else {
            document.getElementById('snd-wrong').play();
            card.classList.add('error-shake');
            setTimeout(() => card.classList.remove('error-shake'), 400);
            document.getElementById('correction-box').innerText = q.errorMsg;
            document.getElementById('correction-box').style.display = 'block';
            document.getElementById('status').innerText = "Cố gắng lên, hãy nói lại nhé!";
            document.getElementById('status').style.color = "var(--error)";
        }
    }

    window.goNext = () => {
        currentIdx++;
        if (currentIdx < data.length) {
            document.getElementById('status').style.color = "#64748b";
            loadQuestion();
        } else { alert("Bạn đã hoàn thành xuất sắc bài nói!"); location.reload(); }
    };

    document.getElementById('btnMic').onclick = () => recognition.start();
</script>
</body>
</html>
