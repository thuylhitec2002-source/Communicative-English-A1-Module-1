<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speaking Practice - strict & glassmorphism</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap&subset=vietnamese" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --error: #ef4444; --bg: #e0e7ff; }
        body { font-family: 'Lexend', Arial, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        /* --- GLASSMORPHISM CARD --- */
        .card { 
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(15px); 
            width: 95%; max-width: 450px; 
            padding: 40px; 
            border-radius: 40px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.1); 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.8);
            position: relative;
        }
        
        /* --- TEXT STYLING --- */
        .vi-q { font-size: 1.4rem; font-weight: 700; color: #1e293b; display: block; margin-bottom: 10px; line-height: 1.4; }
        .en-m { color: #64748b; font-style: italic; font-size: 1rem; margin-bottom: 30px; display: block; }
        
        /* --- GOOGLE LOGOUT & LOGIN BUTTONS --- */
        .google-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            background: white; color: #3c4043; border: 1.5px solid #dadce0;
            padding: 10px 20px; border-radius: 50px; cursor: pointer;
            font-weight: 600; font-size: 0.9rem; font-family: inherit;
        }
        .google-btn:hover { background: #f8f9fa; border-color: #d2d2d2; transform: translateY(-1px); }
        .google-btn svg { width: 18px; height: 18px; }

        /* --- MIC BUTTON: 3D DEPTH --- */
        .mic-btn {
            background: var(--success);
            color: white; border: none;
            width: 90px; height: 90px;
            border-radius: 50%; font-size: 40px;
            cursor: pointer; outline: none;
            box-shadow: inset 0 -8px 0 rgba(0,0,0,0.15), 0 8px 15px rgba(34, 197, 94, 0.3); /* 3D Depth */
            transition: 0.2s;
        }
        .mic-btn.active { background: var(--error); animation: pulse 1s infinite; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.15); }
        .mic-btn:active { transform: translateY(4px); box-shadow: inset 0 -2px 0 rgba(0,0,0,0.15); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* --- STATUS & NAVIGATION --- */
        .status { margin-top: 15px; font-weight: 600; color: #475569; min-height: 25px; }
        .btn-next { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 15px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 20px; display: none; font-family: inherit; }
    </style>
</head>
<body>

<div id="login-screen" class="card">
    <h1 style="color: var(--primary);">Speaking Practice</h1>
    <p>Giới thiệu bản thân bạn.</p>
    <button id="login-btn" class="google-btn">
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59L2.56 13.22C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path></svg>
        Đăng nhập với Google
    </button>
    <p id="login-msg" style="color:var(--error); margin-top:15px; font-size:0.9rem; font-weight:600;"></p>
</div>

<div id="test-screen" class="card" style="display:none;">
    <div class="q-area">
        <span class="vi-q" id="vi-q">...</span>
        <span class="en-m" id="en-m" style="display:none;">...</span>
    </div>
    <button class="mic-btn" id="btnMic">🎙️</button>
    <div class="status" id="status">Sẵn sàng</div>
    <button id="btnNext" class="btn-next" onclick="goNext()">TIẾP THEO →</button>
    
    <br>
    <button class="google-btn" style="margin-top:20px; font-size:0.8rem" onclick="logout()">
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59L2.56 13.22C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path></svg>
        Đăng xuất
    </button>
</div>

<audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCdlTVHwiLOGMnrFe12DE1dQSEHZaJ594I", authDomain: "nguyen-am-tieng-anh.firebaseapp.com", projectId: "nguyen-am-tieng-anh", storageBucket: "nguyen-am-tieng-anh.firebasestorage.app", messagingSenderId: "878440633705", appId: "1:878440633705:web:755de6cb273eb139ebd9f8" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // 1. Kiểm tra đăng nhập tự động
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const q = query(collection(db, "Tienganh_so_cap"), where("email", "==", user.email));
            const snap = await getDocs(q);
            if (!snap.empty) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('test-screen').style.display = 'block';
                initGame();
            } else { await signOut(auth); }
        }
    });

    document.getElementById("login-btn").onclick = async () => {
        try { await signInWithPopup(auth, provider); } 
        catch (e) { document.getElementById("login-msg").innerText = "Lỗi đăng nhập!"; }
    };

    window.logout = () => { signOut(auth).then(() => location.reload()); };

    // --- GAME LOGIC ---
    const data = [
        { 
            vi: "Hãy giới thiệu tên của bạn.", 
            en: "My name is [Name].", 
            // CHẶN NGHIÊM NGẶT: Phải bắt đầu bằng 'My name is' và có tên phía sau
            reg: /^my name is [a-z\s]+$/i
        },
        { 
            vi: "Bạn bao nhiêu tuổi?", 
            en: "I am [Số] years old.", 
            // CHẶN NGHIÊM NGẶT: Phải có số đứng trước 'years old'
            reg: /^i am \d+ years old$/i
        },
        { 
            vi: "Quốc tịch của bạn?", 
            en: "I am from [Country].", 
            // CHẶN NGHIÊM NGẶT: Phải có 'I am from' và có tên quốc gia
            reg: /^i am from [a-z\s]+$/i
        }
    ];

    let currentIdx = 0;
    let recognition;

    function initGame() {
        setupSpeech();
        loadQuestion();
    }

    function setupSpeech() {
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRec) { alert("Trình duyệt không hỗ trợ nhận diện giọng nói."); return; }
        recognition = new SpeechRec();
        recognition.lang = 'en-US';
        recognition.onstart = () => {
            document.getElementById('btnMic').classList.add('active');
            document.getElementById('status').innerText = "Đang lắng nghe...";
            document.getElementById('en-m').style.display = 'none'; // Ẩn cấu trúc khi nghe
        };
        recognition.onresult = (e) => {
            const text = e.results[0][0].transcript.toLowerCase().trim().replace(/[.,!?]$/, "");
            checkAnswer(text);
        };
        recognition.onend = () => document.getElementById('btnMic').classList.remove('active');
    }

    function loadQuestion() {
        const q = data[currentIdx];
        document.getElementById('vi-q').innerText = q.vi;
        document.getElementById('en-m').innerText = q.en;
        document.getElementById('en-m').style.display = 'none'; // Ẩn khi câu mới bắt đầu
        document.getElementById('status').innerText = "Bấm Mic để trả lời";
        document.getElementById('status').style.color = "#475569";
        document.getElementById('btnNext').style.display = 'none';
        
        speakGuide(q.vi);
    }

    function checkAnswer(text) {
        if (data[currentIdx].reg.test(text)) {
            document.getElementById('snd-correct').play();
            document.getElementById('status').innerText = "CHÍNH XÁC! 🎉";
            document.getElementById('status').style.color = "var(--success)";
            document.getElementById('en-m').style.display = 'block'; // Hiện đáp án khi đúng
            document.getElementById('btnNext').style.display = 'block';
        } else {
            // Khi sai, hiện cấu trúc gợi ý để người học biết lỗi
            document.getElementById('en-m').style.display = 'block';
            document.getElementById('status').innerText = "Sai rồi, hãy nói lại!";
            document.getElementById('status').style.color = "var(--error)";
            speakGuide("Sai rồi, cấu trúc là " + data[currentIdx].en.replace(/\[|\]/g, ""));
        }
    }

    window.goNext = () => {
        currentIdx++;
        if (currentIdx < data.length) loadQuestion();
        else { alert("Hoàn thành bài tập!"); location.reload(); }
    }

    function speakGuide(text) {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'vi-VN'; utter.rate = 1.0;
        window.speechSynthesis.speak(utter);
    }

    document.getElementById('btnMic').onclick = () => {
        window.speechSynthesis.cancel();
        recognition.start();
    };
</script>
</body>
</html>
