<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reasoning Gap Fix - Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-light: #a29bfe;
            --success: #00b894;
            --error: #ff7675;
            --orange: #e67e22;
            --bg: #f0f3f7;
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); font-family: 'Quicksand', sans-serif; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }

        .card { 
            background: white; padding: 40px; border-radius: 40px; 
            width: 100%; max-width: 900px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); 
            text-align: center; position: relative; overflow: hidden;
        }

        .screen { display: none; }
        .active { display: block; animation: zoomIn 0.4s; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* --- TABLE 3D & HOVER --- */
        .game-table { width: 100%; border-collapse: separate; border-spacing: 12px; margin: 25px 0; }
        
        .game-table th, .game-table td { 
            padding: 18px; border-radius: 20px; background: white; 
            border: 2px solid #f1f2f6; font-weight: 700; font-size: 15px;
            box-shadow: 0 6px 0 #f1f2f6; position: relative;
        }

        .game-table td:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 12px 20px rgba(0,0,0,0.05);
            border-color: var(--primary-light);
        }

        .game-table th { 
            background: #efedff; color: var(--primary); 
            cursor: pointer; border-color: #dcd9f8;
            box-shadow: 0 6px 0 #dcd9f8;
        }
        .game-table th:hover { background: var(--primary); color: white; transform: translateY(-3px); }
        
        .game-table th.eliminated { 
            background: #eee !important; color: #ccc !important; 
            box-shadow: 0 2px 0 #ddd !important; transform: translateY(4px);
            text-decoration: line-through;
        }

        /* Highlight màu cam - Đã sửa lỗi hiển thị */
        .secret-active { 
            background: #fff4e6 !important; 
            border: 3px solid var(--orange) !important; 
            box-shadow: 0 6px 0 #d35400 !important;
            color: var(--orange) !important;
        }

        .btn-main { 
            padding: 16px 40px; border-radius: 100px; border: none; 
            background: var(--primary); color: white; font-weight: 800; 
            cursor: pointer; box-shadow: 0 8px 15px rgba(108, 92, 231, 0.3); font-size: 16px;
        }

        /* Lớp phủ bảo mật - Đã sửa logic ẩn/hiện */
        #reveal-overlay {
            position: absolute; inset: 0; background: rgba(15, 15, 20, 0.98); 
            border-radius: 40px; z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white;
            transition: opacity 0.5s ease;
        }
        #reveal-overlay.peek { opacity: 0.1; pointer-events: none; } /* Làm mờ để xem bảng */

        .top-bar { position: absolute; top: 25px; right: 30px; display: flex; gap: 15px; }
        
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-8px);} 75% {transform: translateX(8px);} }
        .error-shake { animation: shake 0.4s; }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <div class="top-bar">
        <button id="logout-btn" style="background:none; border:none; color:#aaa; font-weight:bold; cursor:pointer">🚪 ĐĂNG XUẤT</button>
    </div>

    <div id="login-screen" class="screen active">
        <h1>REASONING GAP PRO</h1>
        <button id="login-btn" class="btn-main">Tiếp tục với Google</button>
    </div>

    <div id="play-screen" class="screen">
        <h2 id="round-title" style="color: var(--primary);">VÒNG 1</h2>

        <div id="reveal-overlay">
            <h2 id="overlay-msg" style="color: var(--orange)">BẢO MẬT DANH TÍNH</h2>
            <p>Người hỏi vui lòng quay mặt đi.</p>
            <button class="btn-main" style="background: var(--orange)" onmousedown="peekStart()" onmouseup="peekEnd()" ontouchstart="peekStart()" ontouchend="peekEnd()">NHẤN GIỮ ĐỂ XEM MẬT DANH</button>
            <p style="margin-top:20px; font-size:13px; opacity:0.6">Thả tay ra để ẩn đi và bắt đầu đoán.</p>
            <button class="btn-main" style="background: var(--success); margin-top:20px" onclick="startGameNow()">BẮT ĐẦU ĐOÁN ✅</button>
        </div>

        <div id="table-container"></div>
        <p style="color:#888; font-style:italic">💡 Click 1 lần để gạch tên | Click đúp (2 lần) để CHỐT ĐÁP ÁN</p>
    </div>

    <div id="end-screen" class="screen">
        <h1>🏆 CHIẾN THẮNG!</h1>
        <button class="btn-main" onclick="location.reload()">CHƠI LẠI</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    
    const firebaseConfig = { apiKey: "AIzaSyCdlTVHwiLOGMnrFe12DE1dQSEHZaJ594I", authDomain: "nguyen-am-tieng-anh.firebaseapp.com", projectId: "nguyen-am-tieng-anh" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const provider = new GoogleAuthProvider();

    onAuthStateChanged(auth, (user) => { if (user) startRound(1); });
    document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logout-btn').onclick = () => { signOut(auth); location.reload(); };
</script>

<script>
    const gameData = {
        1: { secret: "SAKURA", title: "VÒNG 1", people: [
            { name: "AKIRA", gender: "Male (Mr.)", country: "Japan", email: "leo_it@gmail.com", phone: "081987 6543" },
            { name: "SAKURA", gender: "Female (Ms.)", country: "Japan", email: "luna_it@gmail.com", phone: "093987 6543" },
            { name: "NAM", gender: "Male (Mr.)", country: "Vietnam", email: "luca_es@yahoo.it", phone: "081555 6666" },
            { name: "LAN", gender: "Female (Ms.)", country: "Vietnam", email: "lucia_es@gmail.com", phone: "093555 6666" }
        ]},
        2: { secret: "LEO", title: "VÒNG 2", people: [
            { name: "LEO", gender: "Male (Mr.)", country: "Italy", email: "leo_vn@gmail.com", phone: "0399 876 543" },
            { name: "LUNA", gender: "Female (Ms.)", country: "Italy", email: "luna_it@gmail.com", phone: "0349 876 543" },
            { name: "LUCA", gender: "Male (Mr.)", country: "Spain", email: "luca_es@yahoo.it", phone: "0395 556 666" },
            { name: "LUCIA", gender: "Female (Ms.)", country: "France", email: "lucia_fr@gmail.com", phone: "0445 556 666" }
        ]}
    };

    let currentRound = 1;
    let isShowingSecret = false;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startRound(r) {
        currentRound = r;
        isShowingSecret = false;
        document.getElementById('reveal-overlay').style.display = 'flex';
        document.getElementById('reveal-overlay').classList.remove('peek');
        renderTable();
        showScreen('play-screen');
    }

    function renderTable() {
        const data = gameData[currentRound];
        let html = `<table class="game-table"><tr><th>Chi tiết</th>`;
        data.people.forEach(p => {
            html += `<th onclick="toggleEliminate(this)" ondblclick="checkWin('${p.name}')">${p.name}</th>`;
        });
        html += `</tr>`;

        ['gender', 'country', 'email', 'phone'].forEach(row => {
            html += `<tr><td><b>${row.toUpperCase()}</b></td>`;
            data.people.forEach(p => {
                const isSecret = (p.name === data.secret && isShowingSecret);
                html += `<td class="${isSecret ? 'secret-active' : ''}">${p[row]}</td>`;
            });
            html += `</tr>`;
        });
        html += `</table>`;
        document.getElementById('table-container').innerHTML = html;
        document.getElementById('round-title').innerText = data.title;
    }

    // Cơ chế Nhấn giữ để xem
    function peekStart() {
        isShowingSecret = true;
        renderTable();
        document.getElementById('reveal-overlay').classList.add('peek');
    }

    function peekEnd() {
        isShowingSecret = false;
        renderTable();
        document.getElementById('reveal-overlay').classList.remove('peek');
    }

    function startGameNow() {
        document.getElementById('reveal-overlay').style.display = 'none';
    }

    function toggleEliminate(el) {
        el.classList.toggle('eliminated');
    }

    function checkWin(name) {
        const secret = gameData[currentRound].secret;
        if (name === secret) {
            if (currentRound === 1) {
                alert("CHÍNH XÁC! Sang Vòng 2 nào.");
                startRound(2);
            } else {
                showScreen('end-screen');
            }
        } else {
            document.getElementById('main-card').classList.add('error-shake');
            setTimeout(() => document.getElementById('main-card').classList.remove('error-shake'), 400);
        }
    }
</script>
</body>
</html>
