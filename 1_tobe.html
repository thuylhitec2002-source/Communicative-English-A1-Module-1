<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Trực Tuyến - To Be Verb Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #6C5CE7;
            --primary-light: #F8F7FF;
            --success: #2ecc71;
            --error: #e74c3c;
            --text-main: #2D3436;
            --text-sub: #636E72;
            --bg-body: #F0F2F5;
            --translation: #3498db;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body { 
            font-family: 'Quicksand', sans-serif; 
            background-color: var(--bg-body); 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #login-screen {
            position: fixed; inset: 0;
            background: var(--bg-body);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }

        .login-card {
            background: #FFFFFF;
            padding: 4rem 2rem;
            border-radius: 2.5rem;
            box-shadow: 0 15px 50px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        .login-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-purple);
            margin: 0 0 1.2rem 0;
        }

        .google-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #FFFFFF;
            color: var(--text-main);
            border: 1.5px solid #E0E0E0;
            padding: 0.9rem 2.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
        }

        #main-content { display: none; width: 100%; height: 100%; justify-content: center; align-items: center; }

        .quiz-container { 
            background: white; width: 100%; max-width: 550px; 
            border-radius: 2rem; box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            padding: 35px; position: relative;
        }

        .progress-bar { height: 8px; background: #eee; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        #progress { height: 100%; background: var(--primary-purple); width: 0%; transition: 0.5s ease; }

        /* Highlight cho chỗ trống */
        .blank-space {
            color: var(--primary-purple);
            border-bottom: 2px solid var(--primary-purple);
            padding: 0 10px;
            font-weight: 700;
        }

        .options { display: flex; flex-direction: column; gap: 14px; margin-bottom: 30px; }
        .opt-btn { 
            padding: 18px; border: 2px solid #F0F2F5; border-radius: 1rem; 
            background: white; cursor: pointer; font-size: 1.1rem; font-weight: 700; font-family: inherit;
        }
        
        /* Màu sắc đáp án */
        .correct-ans { background: #d4edda !important; border-color: var(--success) !important; color: #155724 !important; }
        .wrong-ans { background: #f8d7da !important; border-color: var(--error) !important; color: #721c24 !important; }

        #translation-text { 
            color: var(--translation); font-style: italic; margin-bottom: 25px; padding: 12px;
            display: none; border-left: 4px solid var(--translation); background: #f0faff; border-radius: 0 8px 8px 0;
        }

        .navigation { display: flex; justify-content: space-between; gap: 15px; border-top: 1px solid #f0f0f0; padding-top: 25px; }
        .nav-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-family: inherit; }
        #next-btn.active { background: var(--primary-purple); color: white; }
        #next-btn:disabled { background: #E0E0E0; color: #A0AEC0; }

        #quiz-content, #result-screen { display: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <div class="login-header">
            <h2>Hệ Thống Trực Tuyến</h2>
            <p>Vui lòng đăng nhập để làm bài tập</p>
        </div>
        <button id="login-btn" class="google-btn">Tiếp tục với Google</button>
        <div id="login-msg"></div>
    </div>
</div>

<div id="main-content">
    <audio id="bg-music" loop><source src="https://vnso-pt-7-tf-a128-z3.zmdcdn.me/25de35937e1e650b577265725f162e6f?authen=exp=1774627563~acl=/25de35937e1e650b577265725f162e6f*~hmac=37d9728c9b8d4c33f4bef14a8d69ef2c" type="audio/mpeg"></audio>
    <audio id="snd-correct" src="https://tiengdong.com/wp-content/uploads/am-thanh-cau-tra-loi-dung-right-answer-capcut-www_tiengdong_com.mp3?_=1"></audio>
    <audio id="snd-wrong" src="https://cdn.pixabay.com/audio/2022/03/10/audio_8b0fae46ef.mp3"></audio>

    <div class="quiz-container">
        <div id="start-screen" style="text-align: center;">
            <div style="font-size: 5rem; margin-bottom: 20px;">📝</div>
            <h1>To Be Verb Challenge</h1>
            <button id="start-btn" class="nav-btn" style="background: var(--primary-purple); color:white" onclick="startQuiz()">BẮT ĐẦU</button>
        </div>

        <div id="quiz-content">
            <div class="progress-bar"><div id="progress"></div></div>
            <div id="q-num" style="font-weight: bold; color: #bdc3c7; margin-bottom: 10px;"></div>
            <h2 id="question-text"></h2>
            <div id="translation-text"></div> 
            <div class="options" id="options-container"></div>
            <div class="navigation">
                <button id="prev-btn" class="nav-btn" onclick="goPrev()">Quay lại</button>
                <button id="next-btn" class="nav-btn" onclick="goNext()" disabled>Tiếp theo</button>
            </div>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: var(--primary-purple);">Hoàn thành!</h2>
            <div id="score-summary" style="margin-bottom: 25px; font-weight: 700;"></div>
            <button class="nav-btn" style="background: var(--primary-purple); color:white" onclick="location.reload()">Chơi lại</button>
        </div>
    </div>
</div>

<script type="module">
    // Firebase Logic của bạn giữ nguyên...
    // (Giả lập login nhanh để test)
    document.getElementById("login-btn").onclick = () => {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("main-content").style.display = "flex";
    };
</script>

<script>
    const questions = [
        { q: "1. She _____ from Naples.", options: ["are", "is"], correct: 1, trans: "Giải thích: 'She' là ngôi thứ 3 số ít, đi với 'is'." },
        { q: "2. They _____ from Italy.", options: ["are", "is"], correct: 0, trans: "Giải thích: 'They' là ngôi thứ 3 số nhiều, đi với 'are'." },
        { q: "3. I _____ English, I am Australian.", options: ["not am", "am not"], correct: 1, trans: "Giải thích: Phủ định của 'am' là 'am not'." }
    ];

    let currentIdx = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let isAnswered = false;

    function startQuiz() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-content').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        const qData = questions[currentIdx];
        isAnswered = userAnswers[currentIdx] !== null;

        // Reset UI
        document.getElementById('q-num').innerText = `CÂU HỎI ${currentIdx + 1} / ${questions.length}`;
        document.getElementById('progress').style.width = `${((currentIdx + 1) / questions.length) * 100}%`;
        document.getElementById('translation-text').style.display = isAnswered ? 'block' : 'none';
        document.getElementById('translation-text').innerText = qData.trans;

        // Hiển thị câu hỏi (có điền từ nếu đã trả lời)
        const displayWord = isAnswered ? `<span class="blank-space">${qData.options[qData.correct]}</span>` : "_____";
        document.getElementById('question-text').innerHTML = qData.q.replace("_____", displayWord);

        // Hiển thị options
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        qData.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;

            if (isAnswered) {
                btn.disabled = true;
                if (index === qData.correct) btn.classList.add('correct-ans');
                if (userAnswers[currentIdx] === index && index !== qData.correct) btn.classList.add('wrong-ans');
            } else {
                btn.onclick = () => checkAnswer(index, btn);
            }
            container.appendChild(btn);
        });

        updateNextButton();
    }

    function checkAnswer(selected, btn) {
        if (isAnswered) return;
        
        const qData = questions[currentIdx];
        userAnswers[currentIdx] = selected;
        isAnswered = true;

        const allBtns = document.querySelectorAll('.opt-btn');
        allBtns.forEach(b => b.disabled = true);

        if (selected === qData.correct) {
            btn.classList.add('correct-ans');
            document.getElementById('snd-correct').play();
        } else {
            btn.classList.add('wrong-ans');
            // Sau khi chọn sai, tự động highlight đáp án đúng màu xanh
            allBtns[qData.correct].classList.add('correct-ans');
            document.getElementById('snd-wrong').play();
        }

        // Điền từ vào chỗ trống ngay lập tức
        const displayWord = `<span class="blank-space">${qData.options[qData.correct]}</span>`;
        document.getElementById('question-text').innerHTML = qData.q.replace("_____", displayWord);
        
        // Hiện giải thích
        document.getElementById('translation-text').style.display = 'block';
        updateNextButton();
    }

    function updateNextButton() {
        const btn = document.getElementById('next-btn');
        btn.disabled = !isAnswered;
        btn.classList.toggle('active', isAnswered);
        btn.innerText = currentIdx === questions.length - 1 ? "Xem kết quả" : "Tiếp theo →";
    }

    function goNext() {
        if (currentIdx < questions.length - 1) {
            currentIdx++;
            loadQuestion();
        } else {
            showResult();
        }
    }

    function goPrev() {
        if (currentIdx > 0) {
            currentIdx--;
            loadQuestion();
        }
    }

    function showResult() {
        document.getElementById('quiz-content').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        const score = userAnswers.filter((ans, i) => ans === questions[i].correct).length;
        document.getElementById('score-summary').innerText = `Kết quả: ${score}/${questions.length}`;
    }
</script>
</body>
</html>
